function cfStep(){cfx.clearRect(0,0,innerWidth,innerHeight);cfp=cfp.filter(p=>p.a>0&&p.y<innerHeight+60&&p.life<170);for(const p of cfp){p.life++;p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;if(p.life>34)p.a-=.028;cfx.save();cfx.globalAlpha=Math.max(0,p.a);cfx.translate(p.x,p.y);cfx.rotate(p.r);cfx.fillStyle=p.c;cfx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6);cfx.restore();}if(cfp.length)requestAnimationFrame(cfStep);else{cfRun=false;cfx.clearRect(0,0,innerWidth,innerHeight);}}

/* ---------- awarding + session ---------- */
let SESS=null;
function startSess(cat,kind){SESS={cat,kind,xp:0,gold:0,dhikr:0,cycles:0,verses:0,pages:0,surahs:0,correct:0,total:0};}
function updateBaraka(){const o=$('#orChip');if(o)o.textContent='рЯ™Щ '+nf.format(state.gold);const g=$('#glTop');if(g)g.textContent='вЧИ Nv '+heroLevel();}
function award(catId,pts,el){if(pts<=0)return 0;const mult=boostActive()?2:1;const g=Math.round(pts*mult);const gold=Math.max(1,Math.round(g*0.35));const before=catLevel(catId);const gb=heroLevel();state.xp[catId]=(state.xp[catId]||0)+g;state.gold+=gold;if(SESS){SESS.xp+=g;SESS.gold+=gold;}save();updateBaraka();const cat=state.cats.find(c=>c.id===catId);if(el){const r=el.getBoundingClientRect();floatPts(r.left+r.width/2,r.top+r.height/2,'+'+g,cat?cat.color:'var(--accent)');}beep(700,.1);if(catLevel(catId)>before){beep(880,.16,'triangle',.14);const ga=heroLevel();if(ga>gb){burst(50);beep(990,.22,'triangle',.16);toast('рЯОЗ Niveau global '+ga+' ! ('+(cat?cat.name:'')+' вЖС)');}else toast('вђЖпЄП '+(cat?cat.name:'')+' niveau '+catLevel(catId));}return g;}
function toggleTask(id,el){ensureDay();const t=state.tasks.find(x=>x.id===id);if(!t||t.type!=='check')return;const on=!state.done[id];if(on){state.done[id]=true;if(state.streakDay!==state.day){const y=new Date();y.setDate(y.getDate()-1);state.streak=(state.streakDay===todayKey(y))?state.streak+1:1;state.streakDay=state.day;}award(t.cat,t.pts,el);}else{delete state.done[id];state.xp[t.cat]=Math.max(0,(state.xp[t.cat]||0)-t.pts);beep(380,.08,'sine',.08);save();}renderDay();}
function addEuros(amt){if(!amt||amt<=0)return;ensureDay();const cat=state.cats.find(c=>c.id==='richesse');const before=rankFor(state.euros,cat.ranks).cur;state.euros+=amt;state.daily.euros+=amt;save();const inp=$('#eurInput');if(inp){const r=inp.getBoundingClientRect();floatPts(r.left+40,r.top,'+'+nf.format(amt)+'вВђ',cat.color);}beep(620,.12,'sine',.13);const after=rankFor(state.euros,cat.ranks).cur;if(after>before){burst(50);beep(920,.2,'triangle',.15);toast('рЯОЗ Niveau global вЖС ¬Ј rang ¬Ђ '+cat.ranks[after][1]+' ¬ї (+crit)');}renderDay();}

/* ---------- quests ---------- */
function hashStr(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return h;}
function todayQuests(){let s=hashStr(state.day)||1;const pool=QUEST_POOL.slice(),out=[];for(let k=0;k<3&&pool.length;k++){s=(s*9301+49297)%233280;out.push(pool.splice(s%pool.length,1)[0]);}return out;}
function metricVal(m){switch(m){case'prayers':return PRAYER_IDS.filter(id=>state.done[id]).length;case'dhikr':return state.daily.dhikr;case'verses':return state.daily.verses;case'pages':return state.daily.pages;case'surahs':return state.daily.surahs;case'quiz':return state.daily.quiz;case'kills':return state.daily.kills||0;case'euros':return state.daily.euros;case'tasks':return Object.keys(state.done).length;}return 0;}
function questGold(q){return q.baraka*5;}
function claimQuest(q){ensureDay();if(state.daily.claimed[q.id]||metricVal(q.metric)<q.goal)return;state.daily.claimed[q.id]=true;const gold=questGold(q);state.gold+=gold;if(q.xp>0&&q.cat)award(q.cat,q.xp,$('#glTop'));save();updateBaraka();burst(40);beep(1000,.2,'triangle',.15);toast('рЯ™Щ +'+gold+' or'+(q.xp?(' ¬Ј +'+q.xp+' XP'):''));renderDay();}

function ensureBattle(){const hs=heroStats();const mob=mobAt(state.floor);if(!CB||CB.floor!==state.floor){CB={floor:state.floor,hp:hs.pvmax,mobHP:mob.hp,busy:false};}CB.hp=Math.min(CB.hp,hs.pvmax);}

   </div>
   <button class="attack-btn" id="attackBtn">ATTAQUER вЪФпЄП</button>
   <div class="auto-row"><button class="btn ghost" id="autoBtn" style="flex:none">${autoTimer?'вПЄ Stop':'вЦґ Auto'}</button><span class="reward-hint">Bats des mobs вЖТ рЯ™Щ or вЖТ √©quipe-toi en Boutique</span></div>
   <div class="hstats"><span class="hstat" style="color:#E0475C">рЯЧ°пЄП ATK <b>${hs.atk}</b></span><span class="hstat" style="color:#1FA97A">вЭ§пЄП PV <b>${hs.pvmax}</b></span><span class="hstat" style="color:#2D8CFF">рЯЫ°пЄП DEF <b>${hs.def}</b></span><span class="hstat" style="color:#C99A2E">вЬ¶ CRIT <b>${hs.crit}%</b></span></div>
   <div class="hero-note"><b>Langues</b> вЖТ ATK ¬Ј <b>Richesse</b> вЖТ Crit ¬Ј <b>Esprit</b> вЖТ DEF ¬Ј <b>√Вme/Foi</b> вЖТ PV. Chaque voie qui monte augmente ton <b>niveau global</b>, qui d√©bloque classes, armes et skins.</div>`;
  updateBaraka();
}
function updateBattleUI(){const hs=heroStats(),mob=mobAt(state.floor);const hi=document.querySelector('.hp.hero>i'),mi=document.querySelector('.hp.mob>i');if(hi)hi.style.width=Math.max(0,CB.hp/hs.pvmax*100)+'%';if(mi)mi.style.width=Math.max(0,CB.mobHP/mob.hp*100)+'%';const ht=document.querySelectorAll('.hptext');if(ht[0])ht[0].textContent=Math.max(0,Math.ceil(CB.hp))+' / '+hs.pvmax+' PV';if(ht[1])ht[1].textContent=Math.max(0,Math.ceil(CB.mobHP))+' / '+mob.hp+' PV';}
function animateAttack(who){const el=$(who==='hero'?'#heroBody':'#mobBody');if(el){const cls=who==='hero'?'lunge-r':'lunge-l';el.classList.add(cls);setTimeout(()=>el.classList.remove(cls),160);}const foe=$(who==='hero'?'#mobBody':'#heroBody');if(foe){foe.classList.add('hit');setTimeout(()=>foe.classList.remove('hit'),300);}}
function hitFx(){const w=equippedWeapon();const col=WFX[w.id]?FXCOL[WFX[w.id]]:'#ffffff';const f=$('.fighter.mob');if(!f)return;const d=document.createElement('div');d.className='hitfx';d.style.setProperty('--fx',col);f.appendChild(d);setTimeout(()=>d.remove(),400);}
function floatDmg(who,text,crit,positive,pre){const f=$(who==='hero'?'.fighter.hero':'.fighter.mob');if(!f)return;const d=document.createElement('div');d.className='dmg'+(crit?' crit':'');d.textContent=(pre?pre+' ':'')+(typeof text==='number'?('-'+text):text);d.style.color=positive?'#39D39B':(who==='hero'?'#FF6B7A':(crit?'#FFD36B':'#fff'));d.style.left=(38+Math.random()*24)+'%';f.appendChild(d);setTimeout(()=>d.remove(),820);}
function attack(){ensureBattle();if(CB.busy)return;const hs=heroStats(),mob=mobAt(state.floor),w=equippedWeapon(),fx=WFX[w.id],l=wlvl(w.id),gb=gemBonus();
  // 1) DoT (br√їlure/poison) en d√©but de tour
  if(CB.dot&&CB.dot.turns>0){CB.mobHP-=CB.dot.dmg;floatDmg('mob',CB.dot.dmg,false,false,CB.dot.emoji);CB.dot.turns--;beep(360,.05,'sine',.06);if(CB.mobHP<=0){CB.mobHP=0;updateBattleUI();victory(mob);return;}}
  // 2) coup du h√©ros + effets √† l'impact
  const crit=Math.random()*100<hs.crit;let dmg=hs.atk*(crit?2:1)*(0.85+Math.random()*0.3);let note=null;
  if(fx==='void')dmg*=1+(8+l*2)/100;
  if(fx==='holy'&&mob.boss)dmg*=1+(25+l*3)/100;
  if(fx==='cosmic')dmg*=1.1;
  if(fx==='shadow'&&Math.random()*100<Math.min(50,12+l*3)){dmg+=hs.atk*1.5;note='рЯЧ°пЄП';}
  if(fx==='arcane'&&Math.random()*100<Math.min(50,15+l*3)){dmg+=hs.atk*0.8;note='рЯФЃ';}
  dmg=Math.max(1,Math.round(dmg));CB.mobHP-=dmg;animateAttack('hero');hitFx();floatDmg('mob',dmg,crit,false,note);beep(crit?720:520,.06,'square',.07);vibrate(crit?24:9);
  // vol de vie
  const lifePct=(fx==='cosmic'?15:(fx==='soul'?(10+l*3):0))+gb.life;
  if(lifePct>0){const heal=Math.round(dmg*lifePct/100);if(heal>0){CB.hp=Math.min(hs.pvmax,CB.hp+heal);floatDmg('hero',heal,false,true,'рЯЯҐ');}}
  // pose de DoT (br√їlure : arme feu/cosmos OU gemme d'ambre)
  const burnCh=((fx==='fire'||fx==='cosmic')?Math.min(60,18+l*4):0)+gb.burn;
  if(burnCh>0&&Math.random()*100<Math.min(85,burnCh))CB.dot={emoji:'рЯФ•',turns:2,dmg:Math.round(hs.atk*0.35)};
  else if(fx==='venom'&&Math.random()*100<Math.min(70,22+l*4))CB.dot={emoji:'вШ†пЄП',turns:3,dmg:Math.round(hs.atk*0.2)};
  if(CB.mobHP<=0){CB.mobHP=0;updateBattleUI();victory(mob);return;}
  // gel : le mob rate son tour
  let frozen=false;if(fx==='frost'&&Math.random()*100<Math.min(45,10+l*3)){frozen=true;floatDmg('mob','вЭДпЄП gel√©',false,false);}
  if(!frozen){const mdmg=Math.max(1,Math.round(mob.atk*(50/(50+hs.def))*(0.85+Math.random()*0.3)));CB.hp-=mdmg;setTimeout(()=>{animateAttack('mob');floatDmg('hero',mdmg,false,false);},150);if(CB.hp<=0){CB.hp=0;updateBattleUI();setTimeout(defeat,320);return;}}
  updateBattleUI();}
function victory(mob){CB.busy=true;const gold=Math.round(mob.gold*(1+gemBonus().gold/100));state.gold+=gold;ensureDay();state.daily.kills=(state.daily.kills||0)+1;life().kills++;const mb=$('#mobBody');if(mb)mb.classList.add('dead');floatDmg('mob','+'+gold+' рЯ™Щ',true,true);beep(880,.18,'triangle',.14);burst(mob.boss?90:28);const drop=rollGemDrop(mob.boss);if(drop){const k=gemKey(drop.type,drop.tier);state.gems[k]=(state.gems[k]||0)+1;setTimeout(()=>{floatDmg('mob','рЯТО',true,true);toast('рЯТО Gemme trouv√©e : '+gemName(drop.type,drop.tier)+' ! (Boutique вЖТ Gemmes)');beep(1046,.25,'triangle',.16);burst(50);},260);}updateBaraka();save();setTimeout(()=>{state.floor++;if(state.floor>state.floorMax)state.floorMax=state.floor;CB=null;save();renderArena();toast(mob.boss?('рЯСС Boss vaincu ! +'+gold+' or'):('Vaincu ! +'+gold+' or'));},520);}
function defeat(){CB.busy=true;stopAuto();const hb=$('#heroBody');if(hb)hb.classList.add('flash');beep(200,.3,'sawtooth',.1);const hs=heroStats(),mob=mobAt(state.floor);setTimeout(()=>{CB={floor:state.floor,hp:hs.pvmax,mobHP:mob.hp,busy:false};renderArena();toast('рЯТА Vaincu ! Renforce-toi : pri√®res, quiz, ou meilleur √©quipement.');},650);}
function toggleAuto(){if(autoTimer){stopAuto();}else{autoTimer=setInterval(()=>{if($('#view-arene').classList.contains('hidden')){return;}if(CB&&CB.busy)return;attack();},620);}renderArena();}
function stopAuto(){if(autoTimer){clearInterval(autoTimer);autoTimer=null;}}
function findGear(id){return WEAPONS.find(w=>w.id===id)||ARMORS.find(a=>a.id===id);}
function gearSlot(it){return WEAPONS.includes(it)?'weapon':'armor';}
function buyGear(id){const it=findGear(id);if(!it||state.owned.includes(id)||state.gold<priceOf(it)||heroLevel()<(it.req||0))return;state.gold-=priceOf(it);state.owned.push(id);state.gear[gearSlot(it)]=id;CB=null;save();updateBaraka();renderShop();renderArena();burst(40);beep(900,.18,'triangle',.15);vibrate(30);toast('вЬЕ '+it.name+' achet√© et √©quip√© !');}
function equipGear(id){const it=findGear(id);if(!it||!state.owned.includes(id))return;state.gear[gearSlot(it)]=id;CB=null;save();renderShop();renderArena();beep(760,.12);toast('√Йquip√© : '+it.name);}
function upgWeapon(id){const w=WEAPONS.find(x=>x.id===id);if(!w||!state.owned.includes(id))return;const l=wlvl(id);if(l>=MAX_WLV)return;const c=upgCost(w);if(state.gold<c)return;state.gold-=c;state.wlv[id]=l+1;CB=null;save();updateBaraka();renderShop();renderArena();burst(30);beep(880,.16,'triangle',.15);vibrate(24);toast('вђЖпЄП '+w.name+' am√©lior√© (+'+(l+1)+')');}
function chooseClass(id){if(!CLASSES[id]||state.klass!=='novice')return;state.klass=id;const first=WEAPONS.find(w=>w.cls===id);if(first){if(!state.owned.includes(first.id))state.owned.push(first.id);state.gear.weapon=first.id;}CB=null;save();hideModal();renderArena();renderShop();burst(70);beep(1000,.25,'triangle',.16);toast(CLASSES[id].emoji+' Tu es d√©sormais '+CLASSES[id].name+' !');}
function equipSkin(id){const s=SKINS.find(x=>x.id===id);if(!s||!skinUnlocked(s))return;state.skin=id;CB=null;save();renderShop();renderArena();burst(40);beep(880,.16,'triangle',.15);toast('вЬ® Skin √©quip√© : '+s.name);}
function openClassModal(){const cards=Object.keys(CLASSES).filter(id=>id!=='novice').map(id=>{const c=CLASSES[id];const pal=CLASS_PAL[id];return`<div class="class-card" data-pickclass="${id}"><div class="class-em" style="background:linear-gradient(160deg,${pal.p},${pal.s})">${c.emoji}</div><div class="class-info"><div class="class-n">${c.name}</div><div class="class-d">${c.desc}</div></div><div class="lgo">вАЇ</div></div>`;}).join('');modal.innerHTML=`<div class="modal-top"><button class="icon-btn" data-close>вЖР</button><div class="mt-title">Choisis ta classe</div></div><div class="modal-body"><p class="muted-note" style="margin-top:0">Ce choix est <b>d√©finitif</b> et d√©bloque un arbre d'armes unique. Tu re√Іois ta premi√®re arme gratuitement.</p><div class="class-list">${cards}</div></div>`;showModal();}
function slotGem(k){if(!state.gems[k])return;const n=socketCount();let slot=-1;for(let i=0;i<n;i++)if(!state.sockets[i]){slot=i;break;}if(slot<0){toast('Sertissures pleines вАФ retire une gemme dвАЩabord');return;}state.sockets[slot]=k;state.gems[k]--;if(state.gems[k]<=0)delete state.gems[k];CB=null;save();renderShop();renderArena();burst(30);beep(900,.16,'triangle',.15);vibrate(24);toast('рЯТО Gemme sertie !');}

':PPP.esprit+'/page';h+=`<div class="task" data-reader="${t.id}" style="--cc:${c.color}"><span class="play">вЦґ</span><span class="task-label">${escapeHtml(t.name)}<div class="tsub">${sub}</div></span><span class="task-pts">+${per}</span><button class="del" data-del="${t.id}" aria-label="Supprimer">√Ч</button></div>`;}else if(t.type==='learn'){const sub=t.set==='anglais'?('Quiz adaptatif'+(state.eng&&state.eng.tested?(' ¬Ј niveau '+state.eng.level.toFixed(1)+'/5'):' ¬Ј test de niveau')):('Apprends puis teste-toi (+'+LESSON_PTS[t.set]+'/bonne r√©ponse)');h+=`<div class="task" data-learn="${t.id}" style="--cc:${c.color}"><span class="play">рЯОУ</span><span class="task-label">${escapeHtml(t.name)}<div class="tsub">${sub}</div></span><span class="task-pts">quiz</span><button class="del" data-del="${t.id}" aria-label="Supprimer">√Ч</button></div>`;}else{const isPrayer=PRAYER_IDS.includes(t.id);const done=!!state.done[t.id];let extra='',cls='',lock='';if(isPrayer){const s=prayerStatus(t.id);if(s.state==='soon'){cls='locked';lock='1';extra=`<div class="pt soon" id="pt-${t.id}">рЯХР √† ${s.at}</div>`;}else if(s.state==='open'){cls='open';extra=`<div class="pt open" id="pt-${t.id}">вП≥ ${fmtDur(s.remain)} pour valider</div>`;}else if(s.state==='late'){cls='locked';lock='1';extra=`<div class="pt late" id="pt-${t.id}">вМЫ trop tard (${s.at})</div>`;}}h+=`<div class="task ${done?'done':''} ${cls}" data-id="${t.id}" ${lock?'data-locked="1"':''} style="--cc:${c.color}"><span class="check"><svg viewBox="0 0 24 24"><path d="M4 12l5 5L20 6"/></svg></span><span class="task-label">${escapeHtml(t.name)}${extra}</span><span class="task-pts">+${t.pts}</span><button class="del" data-del="${t.id}" aria-label="Supprimer">√Ч</button></div>`;}}h+='</div>';}h+='</div>';}$('#taskGroups').innerHTML=h;$('#ntCat').innerHTML=state.cats.filter(c=>c.type==='xp').map(c=>`<option value="${c.id}">${c.emoji} ${c.name}</option>`).join('');}

function gearRow(it,stats,hl){const owned=state.owned.includes(it.id);const eq=state.gear.weapon===it.id||state.gear.armor===it.id;const ic=it.type?`<svg viewBox="-22 -34 44 74" style="width:100%;height:100%"><g transform="translate(0,8)">${weaponSVG(it.type,it.mat)}</g></svg>`:'рЯЫ°пЄП';let btn;if(eq)btn='<button class="gbtn on" disabled>√Йquip√© вЬУ</button>';else if(owned)btn=`<button class="gbtn" data-equip="${it.id}">√Йquiper</button>`;else if(hl<(it.req||0))btn=`<button class="gbtn lock" disabled>рЯФТ Nv ${it.req}</button>`;else if(state.gold>=priceOf(it))btn=`<button class="gbtn buy" data-buygear="${it.id}">рЯ™Щ ${nf.format(priceOf(it))}</button>`;else btn=`<button class="gbtn lock" disabled>рЯ™Щ ${nf.format(priceOf(it))}</button>`;return`<div class="gear ${eq?'eq':''}"><div class="gic"${it.type?'':' style="background:var(--surface-2)"'}>${ic}</div><div class="gmain"><div class="gn">${it.name}</div><div class="gs">${stats}</div></div>${btn}</div>`;}

function weaponRow(w,hl){const owned=state.owned.includes(w.id);const eq=state.gear.weapon===w.id;const l=wlvl(w.id);const ic=`<svg viewBox="-22 -34 44 74" style="width:100%;height:100%"><g transform="translate(0,8)">${weaponSVG(w.type,w.mat)}</g></svg>`;const eff=effectDesc(w);

function voieSkinHint(key){const list=SKINS.filter(s=>s.voie===key);if(!list.length)return'';const next=list.find(s=>!skinUnlocked(s));const un=list.filter(skinUnlocked).length;if(!next)return'<span class="vs-on">вЬ® tous les skins d√©bloqu√©s</span>';if(un)return'<span class="vs-on">вЬ® '+un+' skin'+(un>1?'s':'')+'</span> ¬Ј рЯФТ '+next.hint;return'рЯФТ skin : '+next.hint;}

/* counter */
function openCounter(taskId){const t=state.tasks.find(x=>x.id===taskId);startSess(t.cat,'dhikr');CT={idx:0,count:0,taskId,cat:t.cat};buildCounter();showModal();}
function buildCounter(){const cat=state.cats.find(c=>c.id===CT.cat),d=DHIKR[CT.idx],tar=d.target,per=dhikrPts(tar),pct=CT.count/tar*100;modal.innerHTML=`<div class="modal-top"><button class="icon-btn" data-close>вЖР</button><div class="mt-title">рЯУњ Dhikr</div></div><div class="modal-body count-wrap" style="--cc:${cat.color}"><div><div class="dhikr-ar">${d.ar}</div><div class="dhikr-tr">${d.tr}</div><div class="dhikr-fr">¬Ђ ${d.fr} ¬ї</div></div><div class="dhikr-pick">${DHIKR.map((x,i)=>`<button class="dp ${i===CT.idx?'on':''}" data-dh="${i}">${x.tr} ¬Ј ${x.target}</button>`).join('')}</div><div class="ring" id="ringEl" style="--p:${pct}"><div class="inner"><div class="cnum" id="cnum">${CT.count}</div><div class="ctar">/ ${tar}</div><div class="ctap">tape pour compter</div></div></div><div class="per-line">Cycle de ${tar} = +${per} √Вme</div><div class="cyc-line">Cycles : <b id="cyc">${SESS.cycles}</b></div><div class="count-actions"><button class="btn ghost" data-reset>вЖЇ 0</button><button class="btn" data-close style="background:${cat.color}">Terminer</button></div></div>`;}
function ringTap(){const d=DHIKR[CT.idx],tar=d.target;CT.count++;SESS.dhikr++;if(CT.count>=tar){CT.count=0;SESS.cycles++;ensureDay();state.daily.dhikr+=tar;life().dhikr+=tar;award(CT.cat,dhikrPts(tar),$('#ringEl'));save();vibrate([30,40,30]);beep(920,.18,'triangle',.15);burst(40);}else{beep(560+CT.count*4,.05,'sine',.09);vibrate(12);}const ring=$('#ringEl');if(ring){ring.style.setProperty('--p',(CT.count/tar*100));$('#cnum').textContent=CT.count;$('#cyc').textContent=SESS.cycles;}}
function pickDhikr(i){CT.idx=i;CT.count=0;buildCounter();}

function buildReaderLib(){const cat=state.cats.find(c=>c.id===RD.cat);modal.innerHTML=`<div class="modal-top"><button class="icon-btn" data-close>вЖР</button><div class="mt-title">рЯУЦ Lecture</div></div><div class="modal-body"><div class="lib">${ESPRIT.map((it,i)=>{const read=state.daily.readToday['e'+i];return`<div class="libitem ${read?'read':''}" data-open="${i}" style="--cc:${cat.color}"><div class="lt"><div class="ltn">${it.title}</div><div class="lts">${read?'d√©j√† lu aujourdвАЩhui':it.pages.length+' pages'}</div></div><div class="lgo">вАЇ</div></div>`;}).join('')}</div><p class="muted-note">Tes pages lues font monter ton Esprit. Reviens (вЖР) pour ton r√©cap.</p></div>`;}

function buildReaderPage(){const cat=state.cats.find(c=>c.id===RD.cat),it=RD.item,tot=it.pages.length,last=RD.page>=tot-1;modal.innerHTML=`<div class="modal-top"><button class="icon-btn" data-backlib>вЖР</button><div class="mt-title">${it.title}</div></div><div class="modal-body" style="--cc:${cat.color}"><div class="reader-page"><div class="fr" style="text-align:left">${it.pages[RD.page]}</div></div><div class="reader-nav"><button class="btn ghost" data-prev ${RD.page===0?'disabled':''}>вАє</button><span class="pg">page ${RD.page+1} / ${tot}</span>${last?`<button class="btn" data-finishbook style="background:${cat.color}">Terminer (+${(RD.max+1)*PPP.esprit})</button>`:'<button class="btn" data-next>Suivant вАЇ</button>'}</div></div>`;}
function readerNext(){if(RD.page<RD.item.pages.length-1){RD.page++;RD.max=Math.max(RD.max,RD.page);beep(600,.05,'sine',.08);buildReaderPage();}}

function finishBook(){ensureDay();const pages=RD.max+1;const g=award(RD.cat,pages*PPP.esprit,$('#glTop'));state.daily.pages+=pages;life().pages+=pages;state.daily.readToday['e'+RD.bi]=true;save();toast('рЯУЦ '+pages+' page'+(pages>1?'s':'')+' ¬Ј +'+g+' Esprit');beep(900,.16,'triangle',.14);buildReaderLib();}

/* learn + quiz */
let LR=null;
function openLearn(taskId){const t=state.tasks.find(x=>x.id===taskId);if(t.set==='anglais'){openEng(t.cat);return;}startSess(t.cat,'quiz');LR={set:t.set,cat:t.cat,taskId};buildLearnLib();showModal();}
function buildLearnLib(){const cat=state.cats.find(c=>c.id===LR.cat),list=LESSONS[LR.set],isEn=LR.set==='anglais';modal.innerHTML=`<div class="modal-top"><button class="icon-btn" data-close>вЖР</button><div class="mt-title">${isEn?'рЯЧ£пЄП Anglais':'рЯОУ Savoir'}</div></div><div class="modal-body"><div class="lib">${list.map((l,i)=>{const best=state.daily.readToday[LR.set+i];return`<div class="libitem" data-openlesson="${i}" style="--cc:${cat.color}"><div class="lt"><div class="ltn">${l.emoji} ${l.title}</div><div class="lts">${best?('score du jour : '+best):(l.quiz.length+' questions ¬Ј apprends puis teste-toi')}</div></div><div class="lgo">вАЇ</div></div>`;}).join('')}</div><p class="muted-note">Apprends la le√Іon, puis gagne des points selon tes bonnes r√©ponses.</p></div>`;}
function openLesson(i){LR.li=i;LR.lesson=LESSONS[LR.set][i];LR.page=0;buildTeach();}
function buildTeach(){const cat=state.cats.find(c=>c.id===LR.cat),l=LR.lesson,tot=l.teach.length,last=LR.page>=tot-1;modal.innerHTML=`<div class="modal-top"><button class="icon-btn" data-backlearnlib>вЖР</button><div class="mt-title">${l.emoji} ${l.title}</div></div><div class="modal-body" style="--cc:${cat.color}"><div class="reader-page"><div class="fr" style="text-align:left">${l.teach[LR.page]}</div></div><div class="reader-nav"><button class="btn ghost" data-teachprev ${LR.page===0?'disabled':''}>вАє</button><span class="pg">${LR.page+1} / ${tot}</span>${last?`<button class="btn" data-startquiz style="background:${cat.color}">Commencer le quiz вЦґ</button>`:'<button class="btn" data-teachnext>Suivant вАЇ</button>'}</div></div>`;}
function teachNext(){if(LR.page<LR.lesson.teach.length-1){LR.page++;beep(600,.05,'sine',.08);buildTeach();}}
function teachPrev(){if(LR.page>0){LR.page--;buildTeach();}}
function startQuiz(){LR.qi=0;LR.correct=0;LR.answered=false;LR.chosen=-1;buildQuiz();}
function buildQuiz(){const cat=state.cats.find(c=>c.id===LR.cat),l=LR.lesson,q=l.quiz[LR.qi];const opts=q.opts.map((o,i)=>{let cls='';if(LR.answered){if(i===q.a)cls='correct';else if(i===LR.chosen)cls='wrong';}return`<button class="qopt ${cls}" data-opt="${i}" ${LR.answered?'disabled':''}>${escapeHtml(o)}</button>`;}).join('');const feed=LR.answered?(LR.chosen===q.a?`<div class="qfeed" style="color:var(--good)">вЬУ Bonne r√©ponse !</div>`:`<div class="qfeed" style="color:var(--danger)">вЬЧ Rat√© вАФ la bonne r√©ponse est en vert</div>`):'';modal.innerHTML=`<div class="modal-top"><button class="icon-btn" data-close>вЖР</button><div class="mt-title">${l.emoji} Quiz</div></div><div class="modal-body" style="--cc:${cat.color}"><div class="qprog">Question ${LR.qi+1} / ${l.quiz.length} ¬Ј ${LR.correct} вЬУ</div><div class="quiz"><div class="qq">${escapeHtml(q.q)}</div><div class="qopts">${opts}</div>${feed}${LR.answered?`<button class="btn" data-nextq style="background:${cat.color};margin-top:4px">${LR.qi>=l.quiz.length-1?'Voir mon score рЯОЙ':'Question suivante вАЇ'}</button>`:''}</div></div>`;}
function answerQuiz(idx){if(LR.answered)return;LR.answered=true;LR.chosen=idx;const q=LR.lesson.quiz[LR.qi];if(idx===q.a){LR.correct++;beep(880,.14,'triangle',.14);vibrate(20);}else{beep(300,.14,'sine',.12);vibrate([20,40]);}buildQuiz();}
function nextQuiz(){if(LR.qi>=LR.lesson.quiz.length-1){finishQuiz();return;}LR.qi++;LR.answered=false;LR.chosen=-1;buildQuiz();}
function finishQuiz(){ensureDay();const per=LESSON_PTS[LR.set];award(LR.cat,LR.correct*per,null);SESS.correct=LR.correct;SESS.total=LR.lesson.quiz.length;state.daily.quiz+=LR.correct;life().quiz+=LR.correct;state.daily.readToday[LR.set+LR.li]=LR.correct+'/'+LR.lesson.quiz.length;save();buildRecap();}

/* anglais вАФ quiz adaptatif */
let EQ=null;
function engPick(tier,ex){tier=Math.max(1,Math.min(5,Math.round(tier)));let pool=ENG.map((q,i)=>i).filter(i=>ENG[i].d===tier&&!ex.has(i));if(!pool.length)pool=ENG.map((q,i)=>i).filter(i=>Math.abs(ENG[i].d-tier)<=1&&!ex.has(i));if(!pool.length)pool=ENG.map((q,i)=>i).filter(i=>!ex.has(i));if(!pool.length)pool=ENG.map((q,i)=>i);return pool[Math.floor(Math.random()*pool.length)];}
function openEng(cat){if(!state.eng)state.eng={tested:false,level:1,queue:[]};const test=!state.eng.tested;startSess(cat,'quiz');const ex=new Set(),items=[];if(test){for(const t of [1,1,2,2,3,3,4,5]){const idx=engPick(t,ex);ex.add(idx);items.push(idx);}}else{for(const idx of (state.eng.queue||[]).slice(0,2)){if(!ex.has(idx)){ex.add(idx);items.push(idx);}}while(items.length<6){const idx=engPick(state.eng.level+(Math.random()-.5),ex);ex.add(idx);items.push(idx);}}EQ={mode:test?'test':'play',cat,items,i:0,correct:0,answered:false,chosen:-1,order:[0,1,2],retried:new Set()};gotoEQ(0);showModal();}
function gotoEQ(i){EQ.i=i;EQ.answered=false;EQ.chosen=-1;EQ.order=[0,1,2].sort(()=>Math.random()-.5);renderEQ();}
function renderEQ(){const idx=EQ.items[EQ.i],q=ENG[idx],cat=state.cats.find(c=>c.id===EQ.cat);const cp=EQ.order.indexOf(q.a);const opts=EQ.order.map((oi,pos)=>{let cls='';if(EQ.answered){if(pos===cp)cls='correct';else if(pos===EQ.chosen)cls='wrong';}return`<button class="qopt ${cls}" data-eopt="${pos}" ${EQ.answered?'disabled':''}>${escapeHtml(q.opts[oi])}</button>`;}).join('');const feed=EQ.answered?(EQ.chosen===cp?`<div class="qfeed" style="color:var(--good)">вЬУ Correct !</div>`:`<div class="qfeed" style="color:var(--danger)">вЬЧ Rat√© вАФ r√©ponse : ¬Ђ ${escapeHtml(q.opts[q.a])} ¬ї</div>`):'';const stars='вШЕ'.repeat(q.d)+'вШЖ'.repeat(5-q.d);const last=EQ.i>=EQ.items.length-1;modal.innerHTML=`<div class="modal-top"><button class="icon-btn" data-close>вЖР</button><div class="mt-title">рЯЧ£пЄП Anglais${EQ.mode==='test'?' ¬Ј test de niveau':''}</div></div><div class="modal-body" style="--cc:${cat.color}"><div class="qprog">Question ${EQ.i+1} / ${EQ.items.length} ¬Ј ${EQ.correct} вЬУ &nbsp;&nbsp;<span class="eng-stars">${stars}</span></div><div class="quiz"><div class="qq">${escapeHtml(q.q)}</div><div class="qopts">${opts}</div>${feed}${EQ.answered?`<button class="btn" data-enext style="background:${cat.color};margin-top:4px">${last?'Voir mon score рЯОЙ':'Suivant вАЇ'}</button>`:''}</div></div>`;}
function answerEQ(pos){if(EQ.answered)return;EQ.answered=true;EQ.chosen=pos;const idx=EQ.items[EQ.i],q=ENG[idx],cp=EQ.order.indexOf(q.a);const ok=pos===cp;state.eng.queue=state.eng.queue||[];if(ok){EQ.correct++;beep(880,.14,'triangle',.14);vibrate(20);state.eng.queue=state.eng.queue.filter(x=>x!==idx);if(EQ.mode==='play')state.eng.level=Math.min(5,state.eng.level+0.15);}else{beep(300,.14,'sine',.12);vibrate([20,40]);if(!state.eng.queue.includes(idx))state.eng.queue.push(idx);if(!EQ.retried.has(idx)){EQ.retried.add(idx);EQ.items.push(idx);}if(EQ.mode==='play')state.eng.level=Math.max(1,state.eng.level-0.25);}save();renderEQ();}
function nextEQ(){if(EQ.i>=EQ.items.length-1){finishEQ();return;}gotoEQ(EQ.i+1);}
function finishEQ(){ensureDay();if(EQ.mode==='test'){state.eng.level=Math.max(1,Math.min(5,1+(EQ.correct/8)*4));state.eng.tested=true;}const per=LESSON_PTS.anglais;award(EQ.cat,EQ.correct*per,null);SESS.correct=EQ.correct;SESS.total=EQ.items.length;state.daily.quiz+=EQ.correct;life().quiz+=EQ.correct;save();if(EQ.mode==='test')toast('Niveau dвАЩanglais estim√© : '+state.eng.level.toFixed(1)+'/5');buildRecap();}

$('#prayerSetup').addEventListener('click',e=>{if(e.target.closest('#prayerAuto')){setupPrayerAuto();return;}if(e.target.closest('#prayerManual')){$('#ptForm').classList.toggle('show');return;}if(e.target.closest('#prayerClear')){state.prayerTimes=null;state.geo=null;save();renderPrayerSetup();renderDay();toast('Chrono de pri√®re d√©sactiv√©');return;}if(e.target.closest('#ptSave')){const T={};let ok=true;for(const p of PRAYER_IDS){const val=$('#pf-'+p).value;if(!val){ok=false;break;}T[p]=val;}if(!ok){toast('Remplis les 5 horaires');return;}state.prayerTimes={day:todayKey(),times:T};save();renderPrayerSetup();renderDay();toast('вП± Horaires enregistr√©s');}});
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');const tab=t.getAttribute('data-tab');$('#view-arene').classList.toggle('hidden',tab!=='arene');$('#view-day').classList.toggle('hidden',tab!=='day');$('#view-shop').classList.toggle('hidden',tab!=='shop');if(tab!=='arene')stopAuto();if(tab==='arene')renderArena();if(tab==='day')renderDay();if(tab==='shop')renderShop();scrollTo({top:0,behavior:'smooth'});}));
function setTheme(t){state.theme=t;document.documentElement.setAttribute('data-theme',t);$('#themeBtn').textContent=t==='dark'?'вШАпЄП':'рЯМЩ';const m=document.querySelector('meta[name=theme-color]');if(m)m.content=(t==='dark'?'#0E0D18':'#F5F4FA');save();}
function toggleTheme(){const cur=document.documentElement.getAttribute('data-theme');const isDark=cur?cur==='dark':matchMedia('(prefers-color-scheme: dark)').matches;setTheme(isDark?'light':'dark');}
$('#themeBtn').addEventListener('click',toggleTheme);$('#themeBtn2').addEventListener('click',toggleTheme);
function toggleSound(){state.muted=!state.muted;save();updateSoundBtn();if(!state.muted)beep(700,.1);}
function updateSoundBtn(){$('#soundBtn').textContent=state.muted?'рЯФЗ':'рЯФК';}
$('#soundBtn').addEventListener('click',toggleSound);$('#soundBtn2').addEventListener('click',toggleSound);
$('#exportBtn').addEventListener('click',async()=>{try{await navigator.clipboard.writeText(JSON.stringify(state));toast('рЯУЛ Sauvegarde copi√©e');}catch(e){toast('Copie impossible вАФ fais une capture');}});
$('#resetBtn').addEventListener('click',()=>{if(confirm('Tout remettre √† z√©ro ? Progression, √©quipement, √©tages et Baraka seront perdus.')){const th=state.theme,mu=state.muted;stopAuto();state=defaultState();state.theme=th;state.muted=mu;CB=null;save();updateSoundBtn();if(th)setTheme(th);renderAll();toast('Nouveau d√©part вЬ¶');}});

let lastP={};
function prayerTick(){if($('#view-day').classList.contains('hidden'))return;if(!state.prayerTimes||state.prayerTimes.day!==todayKey())return;const now=new Date();let changed=false;for(const p of PRAYER_IDS){const s=prayerStatus(p,now);if(lastP[p]!==s.state)changed=true;lastP[p]=s.state;if(s.state==='open'){const el=document.getElementById('pt-'+p);if(el)el.textContent='вП≥ '+fmtDur(s.remain)+' pour valider';}}if(changed)renderDay();}
setInterval(prayerTick,1000);

function renderAll(){renderArena();renderDay();renderShop();}
if(state.theme)setTheme(state.theme);
updateSoundBtn();updateBaraka();renderArena();renderDay();
addEventListener('visibilitychange',()=>{if(!document.hidden){ensureDay();renderArena();renderDay();}});
</script>
</body>
</html>
