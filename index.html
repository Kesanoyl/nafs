<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0E0D18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NAFS">
<title>NAFS — fais grandir ton âme</title>
<style>
  :root{
    --bg:#F5F4FA; --bg-glow:#EDE9FB;
    --surface:#FFFFFF; --surface-2:#F0EEF8; --surface-3:#E7E3F5;
    --text:#1B1A2E; --muted:#726F88; --faint:#A6A2BC; --border:#E4E0F1;
    --accent:#6D5AE6; --accent-soft:#EDE9FB;
    --c-ame:#7C6BF0; --c-esprit:#17B0A0; --c-richesse:#C98A1E;
    --flame:#F0862E; --good:#1FA97A; --baraka:#C99A2E;
    --shadow:0 8px 24px rgba(40,30,90,.10),0 2px 6px rgba(40,30,90,.06);
    --shadow-sm:0 2px 8px rgba(40,30,90,.08);
    --radius:20px; --radius-sm:14px; --orb1:#8B7BFF; --orb2:#5B44D4;
  }
  @media (prefers-color-scheme: dark){:root{
    --bg:#0E0D18; --bg-glow:#191634; --surface:#1A1830; --surface-2:#221F3D; --surface-3:#2B2850;
    --text:#EEECF7; --muted:#9E9ABA; --faint:#6C688A; --border:#2C2A47;
    --accent:#8B7BFF; --accent-soft:#251F45;
    --c-ame:#9384FF; --c-esprit:#2DD4BF; --c-richesse:#E9B84A; --flame:#FF894D; --good:#33C892; --baraka:#E9B84A;
    --shadow:0 12px 32px rgba(0,0,0,.45),0 2px 8px rgba(0,0,0,.3); --shadow-sm:0 2px 10px rgba(0,0,0,.35);
  }}
  :root[data-theme="light"]{
    --bg:#F5F4FA; --bg-glow:#EDE9FB; --surface:#FFFFFF; --surface-2:#F0EEF8; --surface-3:#E7E3F5;
    --text:#1B1A2E; --muted:#726F88; --faint:#A6A2BC; --border:#E4E0F1; --accent:#6D5AE6; --accent-soft:#EDE9FB;
    --c-ame:#7C6BF0; --c-esprit:#17B0A0; --c-richesse:#C98A1E; --flame:#F0862E; --good:#1FA97A; --baraka:#C99A2E;
    --shadow:0 8px 24px rgba(40,30,90,.10),0 2px 6px rgba(40,30,90,.06); --shadow-sm:0 2px 8px rgba(40,30,90,.08);
  }
  :root[data-theme="dark"]{
    --bg:#0E0D18; --bg-glow:#191634; --surface:#1A1830; --surface-2:#221F3D; --surface-3:#2B2850;
    --text:#EEECF7; --muted:#9E9ABA; --faint:#6C688A; --border:#2C2A47; --accent:#8B7BFF; --accent-soft:#251F45;
    --c-ame:#9384FF; --c-esprit:#2DD4BF; --c-richesse:#E9B84A; --flame:#FF894D; --good:#33C892; --baraka:#E9B84A;
    --shadow:0 12px 32px rgba(0,0,0,.45),0 2px 8px rgba(0,0,0,.3); --shadow-sm:0 2px 10px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  html,body{margin:0;padding:0}
  body{background:radial-gradient(120% 60% at 50% -10%,var(--bg-glow),transparent 60%),var(--bg);
    color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.45;min-height:100vh;}
  .app{max-width:520px;margin:0 auto;padding:0 16px calc(104px + env(safe-area-inset-bottom));}

  .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:calc(16px + env(safe-area-inset-top)) 4px 10px;position:sticky;top:0;z-index:20;
    background:linear-gradient(var(--bg) 72%,transparent);}
  .brand{display:flex;flex-direction:column;line-height:1.05}
  .brand b{font-size:21px;font-weight:800;letter-spacing:.14em}
  .brand span{font-size:10.5px;color:var(--muted);letter-spacing:.02em;margin-top:2px}
  .top-actions{display:flex;gap:7px;align-items:center;margin-left:auto}
  .baraka-chip{display:inline-flex;align-items:center;gap:5px;font-size:13.5px;font-weight:800;
    background:var(--surface);border:1px solid var(--border);color:var(--baraka);padding:8px 12px;border-radius:12px;
    box-shadow:var(--shadow-sm);font-variant-numeric:tabular-nums}
  .icon-btn{width:40px;height:40px;border-radius:12px;border:1px solid var(--border);background:var(--surface);
    color:var(--text);font-size:17px;cursor:pointer;display:grid;place-items:center;box-shadow:var(--shadow-sm);transition:transform .12s;flex:none}
  .icon-btn:active{transform:scale(.92)}
  .icon-btn:focus-visible,.tab:focus-visible,.btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  .view{animation:fade .32s ease}
  .view.hidden{display:none}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  h2.view-title{font-size:20px;font-weight:800;letter-spacing:-.01em;margin:6px 4px 14px}

  .orb-wrap{position:relative;height:232px;display:grid;place-items:center;margin-top:2px}
  #orb{width:100%;height:100%;max-width:340px}
  .orb-stage{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);font-size:11.5px;
    letter-spacing:.22em;text-transform:uppercase;color:var(--muted);font-weight:700}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:16px;margin-bottom:14px;}
  .global-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px}
  .global-lvl{font-size:15px;font-weight:800}.global-lvl b{color:var(--accent)}
  .streak{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:800;background:var(--surface-2);padding:5px 10px;border-radius:999px}
  .streak.off{color:var(--faint)}

  .bar{height:11px;border-radius:999px;background:var(--surface-3);overflow:hidden}
  .bar>i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),color-mix(in srgb,var(--accent) 55%,#fff));transition:width .6s cubic-bezier(.2,.8,.2,1)}
  .bar-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:6px;font-variant-numeric:tabular-nums}

  .stat{display:flex;flex-direction:column;gap:9px;padding:15px 16px}
  .stat-head{display:flex;align-items:center;gap:11px}
  .stat-emoji{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:21px;flex:none;background:var(--tint,var(--surface-2))}
  .stat-name{font-weight:800;font-size:15.5px;line-height:1.1}
  .stat-sub{font-size:12px;color:var(--muted);margin-top:1px;font-weight:600}
  .stat-lvl{margin-left:auto;text-align:right;flex:none}
  .stat-lvl b{font-size:19px;font-weight:800;font-variant-numeric:tabular-nums}
  .stat-lvl span{display:block;font-size:10px;letter-spacing:.14em;color:var(--faint);text-transform:uppercase;font-weight:700}
  .stat .bar>i{background:linear-gradient(90deg,var(--cc),color-mix(in srgb,var(--cc) 50%,#fff))}
  .next-tier{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);background:var(--surface-2);border-radius:10px;padding:8px 11px;font-weight:600}
  .next-tier .lock{filter:grayscale(1);opacity:.75}.next-tier b{color:var(--text)}

  /* quests */
  .quests{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:15px 16px;margin-bottom:18px}
  .quests h3{margin:0 0 3px;font-size:15px;font-weight:800;display:flex;align-items:center;gap:7px}
  .quests .qsub{font-size:12px;color:var(--muted);margin-bottom:12px;font-weight:600}
  .quest{display:flex;align-items:center;gap:11px;padding:10px 0;border-top:1px solid var(--border)}
  .quest .qi{width:34px;height:34px;border-radius:10px;background:var(--surface-2);display:grid;place-items:center;font-size:17px;flex:none}
  .quest .qmain{flex:1;min-width:0}
  .quest .qn{font-size:13.5px;font-weight:700;line-height:1.2}
  .quest .qbar{height:6px;border-radius:999px;background:var(--surface-3);margin-top:6px;overflow:hidden}
  .quest .qbar>i{display:block;height:100%;background:var(--accent);border-radius:999px;transition:width .5s}
  .quest .qr{font-size:11px;color:var(--muted);margin-top:4px;font-weight:700}
  .quest .qr b{color:var(--baraka)}
  .quest .qclaim{border:none;border-radius:10px;padding:9px 12px;font-weight:800;font-size:12px;cursor:pointer;background:var(--accent);color:#fff;flex:none;white-space:nowrap}
  .quest .qclaim:active{transform:scale(.94)}
  .quest .qdone{font-size:12px;font-weight:800;color:var(--good);flex:none}

  /* task groups */
  .group{margin-bottom:20px}
  .group-head{display:flex;align-items:center;gap:9px;margin:0 4px 10px}
  .group-head .ge{font-size:18px}.group-head h3{font-size:15px;font-weight:800;margin:0}
  .group-head .gl{margin-left:auto;font-size:11px;color:var(--muted);font-weight:700;background:var(--surface-2);padding:3px 9px;border-radius:999px}
  .tasks{display:flex;flex-direction:column;gap:9px}
  .task{display:flex;align-items:center;gap:13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
    padding:13px 15px;cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .12s,border-color .2s,background .2s;user-select:none;-webkit-tap-highlight-color:transparent}
  .task:active{transform:scale(.985)}
  .task.done{background:var(--surface-2);border-color:transparent}
  .check{width:26px;height:26px;border-radius:50%;border:2.4px solid var(--cc);flex:none;display:grid;place-items:center;transition:background .2s}
  .task.done .check{background:var(--cc)}
  .check svg{width:15px;height:15px;stroke:#fff;stroke-width:3.4;fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:0;stroke-dasharray:20;stroke-dashoffset:20;transition:opacity .1s}
  .task.done .check svg{opacity:1;stroke-dashoffset:0;transition:stroke-dashoffset .3s .05s ease,opacity .1s}
  .task .play{width:30px;height:30px;border-radius:9px;background:var(--cc);flex:none;display:grid;place-items:center;color:#fff;font-size:14px}
  .task-label{font-weight:650;font-size:14.5px;flex:1}
  .task .tsub{font-size:11px;color:var(--muted);font-weight:700;margin-top:2px}
  .task.done .task-label{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--faint)}
  .task-pts{font-size:12px;font-weight:800;color:var(--cc);font-variant-numeric:tabular-nums;flex:none}
  .task.done .task-pts{color:var(--faint)}
  .task .del{display:none;width:26px;height:26px;border-radius:8px;border:none;background:var(--surface-3);color:#e0475c;font-size:16px;cursor:pointer;flex:none;align-items:center;justify-content:center}
  .editing .task .del{display:flex}.editing .task{cursor:default}

  .money{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:15px;box-shadow:var(--shadow-sm)}
  .money .row{display:flex;gap:8px}
  .money input{flex:1;min-width:0;padding:12px 14px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface-2);color:var(--text);font-size:16px;font-weight:700;font-variant-numeric:tabular-nums}
  .money input:focus{outline:none;border-color:var(--c-richesse)}
  .btn{border:none;border-radius:12px;padding:12px 16px;font-weight:800;font-size:14px;cursor:pointer;background:var(--accent);color:#fff;transition:transform .12s;white-space:nowrap}
  .btn:active{transform:scale(.95)}
  .btn.gold{background:var(--c-richesse)}
  .btn.ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
  .chips{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
  .chip{background:var(--surface-2);border:1px solid var(--border);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:800;cursor:pointer;color:var(--text);font-variant-numeric:tabular-nums}
  .chip:active{transform:scale(.94)}
  .money-total{font-size:13px;color:var(--muted);margin-top:12px;font-weight:600}
  .money-total b{color:var(--c-richesse);font-size:17px;font-variant-numeric:tabular-nums}

  .add-form{background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius-sm);padding:14px;margin-top:10px;display:flex;flex-direction:column;gap:9px}
  .add-form.hidden{display:none}
  .add-form input,.add-form select{padding:11px 13px;border-radius:11px;border:1.5px solid var(--border);background:var(--surface-2);color:var(--text);font-size:15px;font-weight:600;width:100%}
  .add-form .two{display:flex;gap:9px}.add-form .two select{flex:1}.add-form .two input{width:96px;flex:none}
  .muted-note{font-size:12px;color:var(--muted);text-align:center;margin:14px 4px 0;font-weight:600}

  .sec-label{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);font-weight:800;margin:22px 4px 11px}
  .sec-label:first-of-type{margin-top:4px}
  .stages{display:flex;gap:9px;overflow-x:auto;padding:2px 4px 8px;scrollbar-width:none}
  .stages::-webkit-scrollbar{display:none}
  .stage{flex:none;width:96px;border-radius:16px;padding:14px 10px;text-align:center;background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow-sm)}
  .stage.cur{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent) inset,var(--shadow)}
  .stage .dot{width:34px;height:34px;border-radius:50%;margin:0 auto 8px;background:radial-gradient(circle at 35% 30%,var(--orb1),var(--orb2))}
  .stage.off .dot{background:var(--surface-3);opacity:.6}
  .stage .sn{font-size:12px;font-weight:800}.stage .sl{font-size:10px;color:var(--muted);margin-top:2px;font-weight:700}

  .shop{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .skin{border-radius:16px;padding:15px 13px;background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow-sm);text-align:center}
  .skin .prev{width:52px;height:52px;border-radius:50%;margin:0 auto 9px;box-shadow:var(--shadow-sm)}
  .skin .kn{font-size:13.5px;font-weight:800}.skin .ks{font-size:11px;color:var(--muted);margin-top:2px;font-weight:700}
  .skin button{margin-top:10px;width:100%;border:none;border-radius:10px;padding:9px;font-weight:800;font-size:12.5px;cursor:pointer;background:var(--surface-2);color:var(--text)}
  .skin.equipped{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent) inset}
  .skin.equipped button{background:var(--accent);color:#fff}
  .skin.locked button{background:var(--surface-3);color:var(--faint);cursor:not-allowed}
  .skin button.buy{background:var(--baraka);color:#fff}

  .boost{background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-sm);padding:14px 16px;display:flex;align-items:center;gap:12px;margin-top:11px}
  .boost .bi{font-size:22px}.boost .bm{flex:1}.boost .bn{font-weight:800;font-size:14px}.boost .bd{font-size:12px;color:var(--muted);font-weight:600;margin-top:1px}

  .ladder{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 16px;box-shadow:var(--shadow-sm);margin-bottom:11px}
  .ladder-head{display:flex;align-items:center;gap:9px;margin-bottom:11px}
  .ladder-head b{font-weight:800;font-size:14.5px}.ladder-head .lv{margin-left:auto;font-size:12px;color:var(--muted);font-weight:700}
  .steps{display:flex;align-items:center}
  .step{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;position:relative}
  .step .pip{width:14px;height:14px;border-radius:50%;background:var(--surface-3);z-index:1}
  .step.on .pip{background:var(--cc)}
  .step.cur .pip{background:var(--cc);box-shadow:0 0 0 4px color-mix(in srgb,var(--cc) 30%,transparent)}
  .step .st{font-size:9.5px;font-weight:700;color:var(--muted);text-align:center;line-height:1.1}
  .step.on .st{color:var(--text)}
  .step:not(:first-child)::before{content:"";position:absolute;height:3px;top:5.5px;right:50%;width:100%;background:var(--surface-3)}
  .step.on:not(:first-child)::before{background:var(--cc)}

  .settings{display:flex;flex-direction:column;gap:9px;margin-top:6px}
  .set-row{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-weight:700;font-size:14px}
  .set-row .btn{margin-left:auto;padding:8px 14px;font-size:13px}

  .tabbar{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;justify-content:center;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:linear-gradient(transparent,var(--bg) 30%)}
  .tabbar .inner{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:6px;box-shadow:var(--shadow);max-width:520px;width:100%}
  .tab{flex:1;border:none;background:transparent;border-radius:13px;padding:9px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-weight:700;font-size:11px;transition:color .2s,background .2s}
  .tab .ti{font-size:19px;line-height:1}
  .tab.active{color:var(--accent);background:var(--accent-soft)}

  /* modal */
  .modal{position:fixed;inset:0;z-index:80;background:var(--bg);display:flex;flex-direction:column;overscroll-behavior:contain;animation:fade .25s}
  .modal.hidden{display:none}
  .modal-top{display:flex;align-items:center;gap:10px;padding:calc(14px + env(safe-area-inset-top)) 16px 12px}
  .modal-top .mt-title{font-weight:800;font-size:16px;flex:1}
  .modal-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px calc(24px + env(safe-area-inset-bottom))}

  .count-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px;padding:10px 0 20px}
  .dhikr-ar{font-size:30px;font-weight:700;direction:rtl;line-height:1.7}
  .dhikr-tr{font-size:15px;font-weight:800;color:var(--cc);margin-top:2px}
  .dhikr-fr{font-size:12.5px;color:var(--muted);font-weight:600}
  .ring{width:min(70vw,240px);aspect-ratio:1;border-radius:50%;background:conic-gradient(var(--cc) calc(var(--p,0)*3.6deg),var(--surface-3) 0);display:grid;place-items:center;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;transition:transform .08s}
  .ring:active{transform:scale(.97)}
  .ring .inner{width:82%;aspect-ratio:1;border-radius:50%;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:inset 0 2px 10px rgba(0,0,0,.12)}
  .ring .cnum{font-size:52px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
  .ring .ctar{font-size:13px;color:var(--muted);font-weight:700;margin-top:2px}
  .ring .ctap{font-size:11px;color:var(--faint);font-weight:700;margin-top:8px;letter-spacing:.06em}
  .cycles{font-size:13px;font-weight:800}
  .cycles b{color:var(--cc)}
  .dhikr-pick{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;max-width:340px}
  .dp{background:var(--surface-2);border:1px solid var(--border);border-radius:999px;padding:7px 12px;font-size:12px;font-weight:800;cursor:pointer;color:var(--text)}
  .dp.on{background:var(--cc);color:#fff;border-color:transparent}
  .count-actions{display:flex;gap:9px}

  .lib{display:flex;flex-direction:column;gap:10px}
  .libitem{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 15px;cursor:pointer;box-shadow:var(--shadow-sm)}
  .libitem:active{transform:scale(.99)}
  .libitem .lt{flex:1}.libitem .ltn{font-weight:800;font-size:14.5px}.libitem .lts{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px}
  .libitem .lgo{color:var(--cc);font-size:20px;font-weight:800}
  .libitem.read{opacity:.6}

  .reader-page{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px 20px;box-shadow:var(--shadow);font-size:16.5px;line-height:1.7;min-height:40vh}
  .reader-page.arabic .ar{direction:rtl;font-size:26px;line-height:2.1;font-weight:600;text-align:center;margin-bottom:16px}
  .reader-page .tr{font-style:italic;color:var(--muted);font-size:14.5px;line-height:1.7;margin-bottom:14px}
  .reader-page .fr{font-size:16px;line-height:1.7}
  .reader-nav{display:flex;align-items:center;gap:10px;margin-top:16px}
  .reader-nav .pg{flex:1;text-align:center;font-size:12.5px;color:var(--muted);font-weight:800;font-variant-numeric:tabular-nums}
  .reader-nav .btn{flex:none;padding:12px 18px}

  #confetti{position:fixed;inset:0;pointer-events:none;z-index:90;width:100%;height:100%}

});
let state=load();
function load(){
  try{
    const s=JSON.parse(localStorage.getItem(LS));
    if(s){const d=defaultState();return Object.assign(d,s,{cats:s.cats||d.cats,tasks:s.tasks||d.tasks,
      xp:Object.assign({},d.xp,s.xp||{}),done:s.done||{},daily:Object.assign(freshDaily(),s.daily||{}),purchased:s.purchased||[]});}
    // migrate from v2
    const old=JSON.parse(localStorage.getItem('nafs_v2'));
    const d=defaultState();
    if(old){d.xp=Object.assign(d.xp,old.xp||{});d.euros=old.euros||0;d.streak=old.streak||0;d.streakDay=old.streakDay||null;
      d.skin=old.skin||'origine';d.theme=old.theme||null;d.muted=!!old.muted;if(old.cats)d.cats=old.cats;}
    return d;
  }catch(e){return defaultState();}
}
function save(){try{localStorage.setItem(LS,JSON.stringify(state));}catch(e){}}
function todayKey(dt=new Date()){return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');}
function ensureDay(){const t=todayKey();if(state.day!==t){state.day=t;state.done={};state.daily=freshDaily();save();}}

/* ---------- math ---------- */
function levelFromXp(xp){let lvl=1,need=100,acc=0;while(xp>=acc+need){acc+=need;lvl++;need=Math.round(need*1.18);}return{level:lvl,into:xp-acc,need,pct:Math.max(0,Math.min(1,(xp-acc)/need))};}
function catXp(id){return state.xp[id]||0;}
function catLevel(id){return levelFromXp(catXp(id)).level;}
function globalPoints(){let p=0;for(const c of state.cats){p+=(c.type==='xp')?(state.xp[c.id]||0):Math.floor((state.euros||0)/6);}return p;}
function globalLevel(){const p=globalPoints();let lvl=1,need=260,acc=0;while(p>=acc+need){acc+=need;lvl++;need=Math.round(need*1.16);}return{level:lvl,into:p-acc,need,pct:Math.max(0,Math.min(1,(p-acc)/need))};}
function stageFor(cat,level){const arr=cat.stages||GENERIC_STAGES;const i=Math.min(Math.floor((level-1)/3),arr.length-1);return{name:arr[i],idx:i,arr};}
function rankFor(euros,ranks){let cur=0;for(let i=0;i<ranks.length;i++)if(euros>=ranks[i][0])cur=i;const next=cur<ranks.length-1?cur+1:null;return{cur,next,name:ranks[cur][1],nextName:next!=null?ranks[next][1]:null,nextAt:next!=null?ranks[next][0]:null,prevAt:ranks[cur][0]};}
function skin(){return SKINS.find(s=>s.id===state.skin)||SKINS[0];}
function boostActive(){return state.boostDay===todayKey();}

/* ---------- feedback ---------- */
let audioCtx=null;
function beep(freq=660,dur=.12,type='sine',vol=.15){if(state.muted||reduce)return;try{audioCtx=audioCtx||new(window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.value=freq;o.connect(g);g.connect(audioCtx.destination);g.gain.setValueAtTime(vol,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+dur);o.start();o.stop(audioCtx.currentTime+dur);}catch(e){}}
function vibrate(ms){if(navigator.vibrate&&!state.muted)try{navigator.vibrate(ms);}catch(e){}}
function floatPts(x,y,txt,color){const el=document.createElement('div');el.className='float-pts';el.textContent=txt;el.style.color=color;el.style.left=x+'px';el.style.top=y+'px';document.body.appendChild(el);setTimeout(()=>el.remove(),1000);}
let toastT;function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2400);}
const cf=$('#confetti'),cfx=cf.getContext('2d');let cfp=[],cfRun=false;
function sizeCf(){cf.width=innerWidth*devicePixelRatio;cf.height=innerHeight*devicePixelRatio;cfx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);}
function burst(n){if(reduce)return;sizeCf();const cols=[skin().orb[0],skin().orb[1],'#FFD36B','#fff'];for(let i=0;i<(n||90);i++)cfp.push({x:innerWidth/2,y:innerHeight*.36,vx:(Math.random()-.5)*9,vy:Math.random()*-9-3,g:.28,s:Math.random()*6+3,c:cols[i%cols.length],r:Math.random()*6,vr:(Math.random()-.5)*.4,a:1});if(!cfRun){cfRun=true;requestAnimationFrame(cfStep);}}
function cfStep(){cfx.clearRect(0,0,innerWidth,innerHeight);cfp=cfp.filter(p=>p.a>0);for(const p of cfp){p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;p.a-=.012;cfx.save();cfx.globalAlpha=Math.max(0,p.a);cfx.translate(p.x,p.y);cfx.rotate(p.r);cfx.fillStyle=p.c;cfx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6);cfx.restore();}if(cfp.length)requestAnimationFrame(cfStep);else{cfRun=false;cfx.clearRect(0,0,innerWidth,innerHeight);}}

/* ---------- orb ---------- */
const orb=$('#orb'),octx=orb.getContext('2d');let orbT=0,pulse=0;
function sizeOrb(){const r=orb.getBoundingClientRect();orb.width=r.width*devicePixelRatio;orb.height=r.height*devicePixelRatio;octx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);}
function hexA(h,a){const n=parseInt(h.slice(1),16);return`rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;}
function lighten(h,f){const n=parseInt(h.slice(1),16);let r=n>>16&255,g=n>>8&255,b=n&255;r+=(255-r)*f;g+=(255-g)*f;b+=(255-b)*f;return`rgb(${r|0},${g|0},${b|0})`;}
function drawOrb(){const W=orb.clientWidth,H=orb.clientHeight;if(!W){requestAnimationFrame(drawOrb);return;}octx.clearRect(0,0,W,H);const g=globalLevel().level;const base=Math.min(W,H)*.30;const R=Math.min(base+g*2.4,Math.min(W,H)*.46);const cx=W/2,breathe=reduce?0:Math.sin(orbT/42)*3,cy=H/2-8+breathe;const sk=skin(),p=1+pulse;const gg=octx.createRadialGradient(cx,cy,R*.4,cx,cy,R*2.4);gg.addColorStop(0,hexA(sk.orb[0],.34));gg.addColorStop(1,hexA(sk.orb[0],0));octx.fillStyle=gg;octx.fillRect(0,0,W,H);const n=Math.min(3+g,14);for(let i=0;i<n;i++){const a=orbT/60+i*(Math.PI*2/n);const rad=R*1.5+Math.sin(orbT/30+i)*6;const px=cx+Math.cos(a)*rad,py=cy+Math.sin(a)*rad*.9;octx.beginPath();octx.arc(px,py,2+(i%3===0?1.5:0),0,7);octx.fillStyle=hexA(sk.orb[0],.5);octx.fill();}const sg=octx.createRadialGradient(cx-R*.35,cy-R*.4,R*.1,cx,cy,R*p);sg.addColorStop(0,lighten(sk.orb[0],.35));sg.addColorStop(.55,sk.orb[0]);sg.addColorStop(1,sk.orb[1]);octx.beginPath();octx.arc(cx,cy,R*p,0,7);octx.fillStyle=sg;octx.shadowColor=hexA(sk.orb[0],.6);octx.shadowBlur=40;octx.fill();octx.shadowBlur=0;octx.beginPath();octx.arc(cx,cy,R*p,-2.5,-.6);octx.strokeStyle=hexA('#ffffff',.5);octx.lineWidth=2;octx.stroke();octx.beginPath();octx.arc(cx-R*.32,cy-R*.34,R*.16,0,7);octx.fillStyle=hexA('#ffffff',.35);octx.fill();orbT++;pulse*=.9;requestAnimationFrame(drawOrb);}

/* ---------- awarding ---------- */
function applySkin(){const sk=skin();const rs=document.documentElement.style;rs.setProperty('--accent',sk.accent);rs.setProperty('--orb1',sk.orb[0]);rs.setProperty('--orb2',sk.orb[1]);rs.setProperty('--accent-soft',hexA(sk.accent,.12));}
function updateBaraka(){$('#barakaChip').textContent='✦ '+nf.format(state.baraka);}
function award(catId,pts,el){if(pts<=0)return 0;const mult=boostActive()?2:1;const g=Math.round(pts*mult);const before=catLevel(catId),gb=globalLevel().level;state.xp[catId]=(state.xp[catId]||0)+g;save();const cat=state.cats.find(c=>c.id===catId);if(el){const r=el.getBoundingClientRect();floatPts(r.left+r.width/2,r.top+r.height/2,'+'+g,cat?cat.color:'var(--accent)');}beep(700,.1);pulse=Math.max(pulse,.08);if(catLevel(catId)>before){pulse=.14;beep(880,.16,'triangle',.14);}if(globalLevel().level>gb)celebrateGlobal(gb,globalLevel().level);return g;}
function celebrateGlobal(a,b){burst();beep(990,.25,'triangle',.16);const u=SKINS.find(s=>s.req>a&&s.req<=b);toast(u?('✦ Niveau '+b+' — skin « '+u.name+' » débloqué !'):('✦ Niveau global '+b+' atteint !'));}

function toggleTask(id,el){ensureDay();const t=state.tasks.find(x=>x.id===id);if(!t||t.type!=='check')return;const on=!state.done[id];if(on){state.done[id]=true;if(state.streakDay!==state.day){const y=new Date();y.setDate(y.getDate()-1);state.streak=(state.streakDay===todayKey(y))?state.streak+1:1;state.streakDay=state.day;}award(t.cat,t.pts,el);}else{delete state.done[id];state.xp[t.cat]=Math.max(0,(state.xp[t.cat]||0)-t.pts);beep(380,.08,'sine',.08);save();}renderHome();renderDay();}
function addEuros(amt){if(!amt||amt<=0)return;ensureDay();const cat=state.cats.find(c=>c.id==='richesse');const before=rankFor(state.euros,cat.ranks).cur,gb=globalLevel().level;state.euros+=amt;state.daily.euros+=amt;save();const inp=$('#eurInput');if(inp){const r=inp.getBoundingClientRect();floatPts(r.left+40,r.top,'+'+nf.format(amt)+'€',cat.color);}beep(620,.12,'sine',.13);pulse=.1;const after=rankFor(state.euros,cat.ranks).cur;if(after>before){burst();beep(920,.2,'triangle',.15);toast('🎉 Nouveau rang : '+cat.ranks[after][1]);}if(globalLevel().level>gb)celebrateGlobal(gb,globalLevel().level);renderHome();renderDay();}

/* ---------- quests ---------- */
function hashStr(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return h;}
function todayQuests(){let s=hashStr(state.day)||1;const pool=QUEST_POOL.slice(),out=[];for(let k=0;k<3&&pool.length;k++){s=(s*9301+49297)%233280;out.push(pool.splice(s%pool.length,1)[0]);}return out;}
function metricVal(m){switch(m){case'prayers':return PRAYER_IDS.filter(id=>state.done[id]).length;case'dhikr':return state.daily.dhikr;case'pages':return state.daily.pages;case'surahs':return state.daily.surahs;case'euros':return state.daily.euros;case'tasks':return Object.keys(state.done).length;}return 0;}
function claimQuest(q){ensureDay();if(state.daily.claimed[q.id]||metricVal(q.metric)<q.goal)return;state.daily.claimed[q.id]=true;state.baraka+=q.baraka;if(q.xp>0&&q.cat)award(q.cat,q.xp,$('#barakaChip'));save();updateBaraka();burst(40);beep(1000,.2,'triangle',.15);toast('✦ +'+q.baraka+' Baraka'+(q.xp?(' · +'+q.xp+' XP'):''));renderDay();renderHome();}

/* ---------- render: home ---------- */
function renderHome(){ensureDay();const gl=globalLevel();const si=Math.min(Math.floor((gl.level-1)/4),ORB_STAGES.length-1);$('#orbStage').textContent=ORB_STAGES[si];const on=state.streak>0;$('#globalCard').innerHTML=`<div class="global-top"><span class="global-lvl">Niveau global <b>${gl.level}</b>${boostActive()?' · ⚡×2':''}</span><span class="streak ${on?'':'off'}">🔥 ${state.streak} ${state.streak>1?'jours':'jour'}</span></div><div class="bar"><i style="width:${(gl.pct*100).toFixed(1)}%"></i></div><div class="bar-meta"><span>${nf.format(gl.into)} / ${nf.format(gl.need)} pts</span><span>${ORB_STAGES[si]}</span></div>`;let h='';for(const c of state.cats){const tint=hexA(c.color,.14);if(c.type==='money'){const rk=rankFor(state.euros,c.ranks);const span=rk.nextAt!=null?(rk.nextAt-rk.prevAt):1;const pct=rk.nextAt!=null?Math.max(0,Math.min(1,(state.euros-rk.prevAt)/span)):1;h+=`<div class="card stat" style="--cc:${c.color};--tint:${tint}"><div class="stat-head"><div class="stat-emoji">${c.emoji}</div><div><div class="stat-name">${c.name}</div><div class="stat-sub">${rk.name}</div></div><div class="stat-lvl"><b>${nf.format(state.euros)}€</b><span>fortune</span></div></div><div class="bar"><i style="width:${(pct*100).toFixed(1)}%"></i></div>${rk.nextName?`<div class="next-tier"><span class="lock">🔒</span>Prochain rang : <b>${rk.nextName}</b> · encore ${nf.format(rk.nextAt-state.euros)}€</div>`:`<div class="next-tier">👑 Rang maximum atteint</div>`}</div>`;}else{const li=levelFromXp(catXp(c.id)),st=stageFor(c,li.level);const nextStage=st.idx<st.arr.length-1?st.arr[st.idx+1]:null;const nextLvl=(st.idx+1)*3+1;h+=`<div class="card stat" style="--cc:${c.color};--tint:${tint}"><div class="stat-head"><div class="stat-emoji">${c.emoji}</div><div><div class="stat-name">${c.name}</div><div class="stat-sub">${st.name}</div></div><div class="stat-lvl"><b>${li.level}</b><span>niveau</span></div></div><div class="bar"><i style="width:${(li.pct*100).toFixed(1)}%"></i></div><div class="bar-meta"><span>${nf.format(li.into)} / ${nf.format(li.need)} pts</span><span>${st.name}</span></div>${nextStage?`<div class="next-tier"><span class="lock">🔒</span>Prochaine évolution : <b>${nextStage}</b> · niveau ${nextLvl}</div>`:`<div class="next-tier">🌟 Évolution ultime atteinte</div>`}</div>`;}}$('#statList').innerHTML=h;updateBaraka();}

/* ---------- render: day ---------- */
function renderQuests(){const qs=todayQuests();let h=`<div class="quests"><h3>🎯 Quêtes du jour</h3><div class="qsub">Réussis-les pour gagner de la Baraka ✦ et de l’XP bonus.</div>`;for(const q of qs){const v=Math.min(metricVal(q.metric),q.goal),pct=v/q.goal*100,claimed=state.daily.claimed[q.id],ready=v>=q.goal;h+=`<div class="quest"><div class="qi">${q.emoji}</div><div class="qmain"><div class="qn">${q.label}</div><div class="qbar"><i style="width:${pct}%"></i></div><div class="qr">${v}/${q.goal} · récompense <b>✦${q.baraka}</b>${q.xp?(' + '+q.xp+' XP'):''}</div></div>${claimed?'<span class="qdone">✓ fait</span>':(ready?`<button class="qclaim" data-quest="${q.id}">Réclamer</button>`:'')}</div>`;}h+='</div>';return h;}
function renderDay(){ensureDay();$('#questBox').innerHTML=renderQuests();let h='';for(const c of state.cats){let lvlLabel=c.type==='money'?rankFor(state.euros,c.ranks).name:('Niv. '+catLevel(c.id));h+=`<div class="group"><div class="group-head"><span class="ge">${c.emoji}</span><h3>${c.name}</h3><span class="gl">${lvlLabel}</span></div>`;if(c.type==='money'){const rk=rankFor(state.euros,c.ranks);h+=`<div class="money" style="--cc:${c.color}"><div class="row"><input id="eurInput" type="number" inputmode="decimal" placeholder="Montant en €" aria-label="Montant"><button class="btn gold" id="eurAdd">Ajouter</button></div><div class="chips"><button class="chip" data-eur="20">+20</button><button class="chip" data-eur="50">+50</button><button class="chip" data-eur="100">+100</button><button class="chip" data-eur="500">+500</button></div><div class="money-total">Fortune : <b>${nf.format(state.euros)}€</b>${rk.nextName?` — plus que <b style="font-size:13px">${nf.format(rk.nextAt-state.euros)}€</b> avant « ${rk.nextName} »`:''}</div></div>`;}const tks=state.tasks.filter(t=>t.cat===c.id);if(tks.length){h+=`<div class="tasks" style="margin-top:${c.type==='money'?'10px':'0'}">`;for(const t of tks){if(t.type==='counter'){h+=`<div class="task" data-counter="${t.id}" style="--cc:${c.color}"><span class="play">▶</span><span class="task-label">${escapeHtml(t.name)}<div class="tsub">Aujourd’hui : ${state.daily.dhikr} dhikr</div></span><span class="task-pts">+${t.pts}/cycle</span><button class="del" data-del="${t.id}" aria-label="Supprimer">×</button></div>`;}else if(t.type==='reader'){const done=t.lib==='coran'?state.daily.surahs:0;const sub=t.lib==='coran'?('Aujourd’hui : '+state.daily.surahs+' sourate'+(state.daily.surahs>1?'s':'')):('Aujourd’hui : '+state.daily.pages+' page'+(state.daily.pages>1?'s':''));h+=`<div class="task" data-reader="${t.id}" style="--cc:${c.color}"><span class="play">▶</span><span class="task-label">${escapeHtml(t.name)}<div class="tsub">${sub}</div></span><span class="task-pts">+${PPP[t.lib]}/page</span><button class="del" data-del="${t.id}" aria-label="Supprimer">×</button></div>`;}else{const done=!!state.done[t.id];h+=`<div class="task ${done?'done':''}" data-id="${t.id}" style="--cc:${c.color}"><span class="check"><svg viewBox="0 0 24 24"><path d="M4 12l5 5L20 6"/></svg></span><span class="task-label">${escapeHtml(t.name)}</span><span class="task-pts">+${t.pts}</span><button class="del" data-del="${t.id}" aria-label="Supprimer">×</button></div>`;}}h+='</div>';}h+='</div>';}$('#taskGroups').innerHTML=h;$('#ntCat').innerHTML=state.cats.filter(c=>c.type==='xp').map(c=>`<option value="${c.id}">${c.emoji} ${c.name}</option>`).join('');}

/* ---------- render: evo ---------- */
function renderEvo(){const gl=globalLevel().level;const si=Math.min(Math.floor((gl-1)/4),ORB_STAGES.length-1);$('#orbStages').innerHTML=ORB_STAGES.map((s,i)=>{const cls=i<si?'on':(i===si?'on cur':'off');return`<div class="stage ${cls}"><div class="dot"></div><div class="sn">${s}</div><div class="sl">niv. ${i*4+1}</div></div>`;}).join('');$('#skinList').innerHTML=SKINS.map(s=>{const owned=gl>=s.req||state.purchased.includes(s.id);const eq=state.skin===s.id;let btn,cls=eq?'equipped':'';if(eq)btn='<button>Actif</button>';else if(owned)btn=`<button data-skin="${s.id}">Équiper</button>`;else if(state.baraka>=s.price)btn=`<button class="buy" data-buy="${s.id}">Acheter ✦${s.price}</button>`;else{cls='locked';btn=`<button disabled>🔒 niv.${s.req} · ✦${s.price}</button>`;}return`<div class="skin ${cls}"><div class="prev" style="background:radial-gradient(circle at 35% 30%,${s.orb[0]},${s.orb[1]})"></div><div class="kn">${s.name}</div><div class="ks">${owned?(eq?'équipé':'possédé'):('niv.'+s.req+' ou ✦'+s.price)}</div>${btn}</div>`;}).join('');const ba=boostActive();$('#boostBox').innerHTML=`<div class="boost"><div class="bi">⚡</div><div class="bm"><div class="bn">Journée bénie ×2</div><div class="bd">${ba?'Actif aujourd’hui — tous tes points sont doublés !':'Double tous les points gagnés aujourd’hui.'}</div></div>${ba?'<span class="qdone">✓ actif</span>':`<button class="btn ${state.baraka>=BOOST_COST?'gold':'ghost'}" id="buyBoost" ${state.baraka<BOOST_COST?'disabled':''}>✦${BOOST_COST}</button>`}</div>`;let h='';for(const c of state.cats){if(c.type==='money'){const rk=rankFor(state.euros,c.ranks);h+=`<div class="ladder" style="--cc:${c.color}"><div class="ladder-head"><span>${c.emoji}</span><b>${c.name}</b><span class="lv">${rk.name}</span></div><div class="steps">${c.ranks.map((r,i)=>{const cls=i<rk.cur?'on':(i===rk.cur?'on cur':'');return`<div class="step ${cls}"><div class="pip"></div><div class="st">${r[1].replace(/ .*/,'')}</div></div>`;}).join('')}</div></div>`;}else{const li=levelFromXp(catXp(c.id)),st=stageFor(c,li.level),arr=st.arr;h+=`<div class="ladder" style="--cc:${c.color}"><div class="ladder-head"><span>${c.emoji}</span><b>${c.name}</b><span class="lv">Niv. ${li.level} · ${st.name}</span></div><div class="steps">${arr.map((s,i)=>{const cls=i<st.idx?'on':(i===st.idx?'on cur':'');return`<div class="step ${cls}"><div class="pip"></div><div class="st">${s}</div></div>`;}).join('')}</div></div>`;}}$('#catLadders').innerHTML=h;updateBaraka();}

function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

let CT=null;
function showModal(){modal.classList.remove('hidden');}
function closeModal(){modal.classList.add('hidden');modal.innerHTML='';CT=null;renderDay();renderHome();}
function openCounter(taskId){const t=state.tasks.find(x=>x.id===taskId);CT={idx:0,count:0,cycles:0,taskId,cat:t.cat,pts:t.pts};buildCounter();showModal();}
function buildCounter(){const cat=state.cats.find(c=>c.id===CT.cat),d=DHIKR[CT.idx],tar=d.target,pct=CT.count/tar*100;modal.innerHTML=`<div class="modal-top" style="--cc:${cat.color}"><button class="icon-btn" data-close>←</button><div class="mt-title">📿 Dhikr</div></div><div class="modal-body count-wrap" style="--cc:${cat.color}"><div><div class="dhikr-ar">${d.ar}</div><div class="dhikr-tr">${d.tr}</div><div class="dhikr-fr">« ${d.fr} »</div></div><div class="dhikr-pick">${DHIKR.map((x,i)=>`<button class="dp ${i===CT.idx?'on':''}" data-dh="${i}">${x.tr} · ${x.target}</button>`).join('')}</div><div class="ring" id="ringEl" style="--p:${pct}"><div class="inner"><div class="cnum" id="cnum">${CT.count}</div><div class="ctar">/ ${tar}</div><div class="ctap">tape pour compter</div></div></div><div class="cycles">Cycles complétés : <b id="cyc">${CT.cycles}</b></div><div class="count-actions"><button class="btn ghost" data-reset>↺ Remettre à 0</button><button class="btn" data-close>Terminer</button></div></div>`;}
function ringTap(){const d=DHIKR[CT.idx],tar=d.target;CT.count++;const cat=state.cats.find(c=>c.id===CT.cat);if(CT.count>=tar){CT.count=0;CT.cycles++;ensureDay();state.daily.dhikr+=tar;award(CT.cat,CT.pts,$('#ringEl'));save();vibrate([30,40,30]);beep(920,.18,'triangle',.15);burst(40);}else{beep(560+CT.count*4,.05,'sine',.09);vibrate(12);}const ring=$('#ringEl');if(ring){ring.style.setProperty('--p',(CT.count/tar*100));$('#cnum').textContent=CT.count;$('#cyc').textContent=CT.cycles;}}

function readerNext(){if(RD.page<RD.item.pages.length-1){RD.page++;RD.max=Math.max(RD.max,RD.page);beep(600,.05,'sine',.08);buildReaderPage();}}
function readerPrev(){if(RD.page>0){RD.page--;buildReaderPage();}}

function finishSurah(i){ensureDay();const g=award(RD.cat,PPP.coran,$('#barakaChip'));state.daily.surahs+=1;state.daily.pages+=1;state.daily.readToday['c'+i]=true;save();burst(40);beep(900,.16,'triangle',.14);toast('🕋 Sourate lue · +'+g+' Foi');buildReaderLib();}

/* ---------- events ---------- */
modal.addEventListener('click',e=>{const t=e.target;if(t.closest('[data-close]')){closeModal();return;}if(t.closest('[data-reset]')){CT.count=0;buildCounter();return;}const dh=t.closest('[data-dh]');if(dh){pickDhikr(+dh.getAttribute('data-dh'));return;}if(t.closest('#ringEl')){ringTap();return;}if(t.closest('[data-backlib]')){buildReaderLib();return;}const op=t.closest('[data-open]');if(op){openReaderItem(+op.getAttribute('data-open'));return;}if(t.closest('[data-next]')){readerNext();return;}if(t.closest('[data-prev]')){readerPrev();return;}if(t.closest('[data-finishbook]')){finishBook();return;}const fs=t.closest('[data-finishsurah]');if(fs){finishSurah(+fs.getAttribute('data-finishsurah'));return;}});

$('#taskGroups').addEventListener('click',e=>{const del=e.target.closest('[data-del]');if(del){const id=del.getAttribute('data-del');state.tasks=state.tasks.filter(t=>t.id!==id);delete state.done[id];save();renderDay();renderHome();return;}if($('#view-day').classList.contains('editing'))return;const cnt=e.target.closest('[data-counter]');if(cnt){openCounter(cnt.getAttribute('data-counter'));return;}const rd=e.target.closest('[data-reader]');if(rd){openReader(rd.getAttribute('data-reader'));return;}const task=e.target.closest('[data-id]');if(task){toggleTask(task.getAttribute('data-id'),task);return;}if(e.target.closest('#eurAdd')){const v=parseFloat($('#eurInput').value);if(v>0){addEuros(Math.round(v));$('#eurInput').value='';}return;}const chip=e.target.closest('[data-eur]');if(chip)addEuros(parseInt(chip.getAttribute('data-eur')));});
$('#questBox').addEventListener('click',e=>{const q=e.target.closest('[data-quest]');if(q){const qq=todayQuests().find(x=>x.id===q.getAttribute('data-quest'));if(qq)claimQuest(qq);}});
$('#editToggle').addEventListener('click',()=>{const v=$('#view-day');v.classList.toggle('editing');const on=v.classList.contains('editing');$('#addForm').classList.toggle('hidden',!on);$('#editToggle').textContent=on?'✓ Terminé':'✎ Modifier mes tâches';});
$('#ntAdd').addEventListener('click',()=>{const name=$('#ntName').value.trim();const pts=parseInt($('#ntPts').value)||10;const cat=$('#ntCat').value;if(!name)return;state.tasks.push({id:'t'+(state.seq++),cat,name,pts:Math.max(1,Math.min(999,pts)),type:'check'});save();$('#ntName').value='';renderDay();renderHome();beep(700,.1);});
$('#addCatBtn').addEventListener('click',()=>$('#addCatForm').classList.toggle('hidden'));
$('#ncAdd').addEventListener('click',()=>{const name=$('#ncName').value.trim();if(!name)return;const emoji=$('#ncEmoji').value.trim()||'⭐';const color=$('#ncColor').value;const id='c'+(state.seq++);state.cats.push({id,name,emoji,color,type:'xp'});state.xp[id]=0;save();$('#ncName').value='';$('#ncEmoji').value='';$('#addCatForm').classList.add('hidden');renderAll();toast(emoji+' Catégorie « '+name+' » créée');});
$('#skinList').addEventListener('click',e=>{const eq=e.target.closest('[data-skin]');if(eq){state.skin=eq.getAttribute('data-skin');save();applySkin();renderEvo();beep(760,.12);return;}const bu=e.target.closest('[data-buy]');if(bu){const s=SKINS.find(x=>x.id===bu.getAttribute('data-buy'));if(s&&state.baraka>=s.price){state.baraka-=s.price;state.purchased.push(s.id);state.skin=s.id;save();applySkin();updateBaraka();renderEvo();burst(40);beep(900,.18,'triangle',.15);toast('✦ Skin « '+s.name+' » acheté et équipé');}}});
$('#boostBox').addEventListener('click',e=>{if(e.target.closest('#buyBoost')&&state.baraka>=BOOST_COST){state.baraka-=BOOST_COST;state.boostDay=todayKey();save();updateBaraka();renderEvo();renderHome();burst(40);beep(1000,.2,'triangle',.16);toast('⚡ Journée bénie activée — points ×2 !');}});
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');const tab=t.getAttribute('data-tab');$('#view-home').classList.toggle('hidden',tab!=='home');$('#view-day').classList.toggle('hidden',tab!=='day');$('#view-evo').classList.toggle('hidden',tab!=='evo');if(tab==='evo')renderEvo();if(tab==='day')renderDay();scrollTo({top:0,behavior:'smooth'});}));

function setTheme(t){state.theme=t;document.documentElement.setAttribute('data-theme',t);$('#themeBtn').textContent=t==='dark'?'☀️':'🌙';const m=document.querySelector('meta[name=theme-color]');if(m)m.content=(t==='dark'?'#0E0D18':'#F5F4FA');save();}
function toggleTheme(){const cur=document.documentElement.getAttribute('data-theme');const isDark=cur?cur==='dark':matchMedia('(prefers-color-scheme: dark)').matches;setTheme(isDark?'light':'dark');}
$('#themeBtn').addEventListener('click',toggleTheme);$('#themeBtn2').addEventListener('click',toggleTheme);
function toggleSound(){state.muted=!state.muted;save();updateSoundBtn();if(!state.muted)beep(700,.1);}
function updateSoundBtn(){$('#soundBtn').textContent=state.muted?'🔇':'🔊';}
$('#soundBtn').addEventListener('click',toggleSound);$('#soundBtn2').addEventListener('click',toggleSound);
$('#exportBtn').addEventListener('click',async()=>{try{await navigator.clipboard.writeText(JSON.stringify(state));toast('📋 Sauvegarde copiée');}catch(e){toast('Copie impossible — fais une capture');}});
$('#resetBtn').addEventListener('click',()=>{if(confirm('Tout remettre à zéro ? Points, niveaux, fortune et Baraka seront perdus.')){const th=state.theme,mu=state.muted;state=defaultState();state.theme=th;state.muted=mu;save();applySkin();updateSoundBtn();if(th)setTheme(th);renderAll();toast('Nouveau départ ✦');}});

function renderAll(){renderHome();renderDay();renderEvo();}
if(state.theme)setTheme(state.theme);
updateSoundBtn();applySkin();updateBaraka();sizeOrb();renderAll();requestAnimationFrame(drawOrb);
addEventListener('resize',sizeOrb);
addEventListener('visibilitychange',()=>{if(!document.hidden){ensureDay();renderAll();}});
</script>
</body>
</html>
