<style>

const ESPRIT=[
  {title:'La discipline',pages:[
    "La discipline, c'est choisir ce que tu veux vraiment plutôt que ce que tu veux maintenant. Chaque petite action répétée devient une force. Ce que tu fais une fois ne compte presque pas ; ce que tu fais chaque jour construit qui tu deviens.",

  {t:'Al-Fâtiha — L’Ouverture',v:[
    ['بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ','Bismillâhi r-rahmâni r-rahîm','Au nom d’Allah, le Tout Miséricordieux, le Très Miséricordieux.'],

/* ---------- math ---------- */
function levelFromXp(xp){let lvl=1,need=100,acc=0;while(xp>=acc+need){acc+=need;lvl++;need=Math.round(need*1.18);}return{level:lvl,into:xp-acc,need,pct:Math.max(0,Math.min(1,(xp-acc)/need))};}
function catXp(id){return state.xp[id]||0;}
function catLevel(id){return levelFromXp(catXp(id)).level;}
function globalPoints(){let p=0;for(const c of state.cats)p+=(c.type==='xp')?(state.xp[c.id]||0):Math.floor((state.euros||0)/6);return p;}
function globalLevel(){const p=globalPoints();let lvl=1,need=260,acc=0;while(p>=acc+need){acc+=need;lvl++;need=Math.round(need*1.16);}return{level:lvl,into:p-acc,need,pct:Math.max(0,Math.min(1,(p-acc)/need))};}
function globalPtsForLevel(L){let need=260,acc=0;for(let k=1;k<L;k++){acc+=need;need=Math.round(need*1.16);}return acc;}
function stageFor(cat,level){const arr=cat.stages||GENERIC_STAGES;const i=Math.min(Math.floor((level-1)/3),arr.length-1);return{name:arr[i],idx:i,arr};}
function rankFor(euros,ranks){let cur=0;for(let i=0;i<ranks.length;i++)if(euros>=ranks[i][0])cur=i;const next=cur<ranks.length-1?cur+1:null;return{cur,next,name:ranks[cur][1],nextName:next!=null?ranks[next][1]:null,nextAt:next!=null?ranks[next][0]:null,prevAt:ranks[cur][0]};}
function boostActive(){return state.boostDay===todayKey();}
function itemById(id){return ITEMS.find(x=>x.id===id);}
function equippedArmor(){return itemById(state.gear.armor)||itemById('a0');}
function equippedWeapon(){return itemById(state.gear.weapon)||itemById('w0');}
function equippedAmulet(){return state.gear.amulet?itemById(state.gear.amulet):null;}
function gearStats(){const s={atk:0,pv:0,def:0,crit:0};for(const slot in state.gear){const it=itemById(state.gear[slot]);if(it){s.atk+=it.atk||0;s.pv+=it.pv||0;s.def+=it.def||0;s.crit+=it.crit||0;}}return s;}
function heroStats(){const g=gearStats();const a=catLevel('ame'),e=catLevel('esprit'),l=(state.xp['langues']!=null?catLevel('langues'):0);const rc=state.cats.find(c=>c.type==='money');const ri=rc?rankFor(state.euros,rc.ranks).cur:0;const atk=6+a*3+l*2+g.atk;const pvmax=60+(a+e+l)*6+ri*20+g.pv;const crit=Math.min(60,5+e*2+g.crit);const def=ri*2+g.def;return{atk,pvmax,crit,def,level:a+e+l+ri};}
function fmtDur(ms){ms=Math.max(0,ms);const s=Math.floor(ms/1000),m=Math.floor(s/60),ss=s%60;if(m>=60){const h=Math.floor(m/60);return h+'h'+String(m%60).padStart(2,'0');}return m+':'+String(ss).padStart(2,'0');}

/* ---------- prayer times ---------- */
let pFetching=false;
function fetchPrayerTimes(lat,lon){if(pFetching)return;pFetching=true;const d=new Date();const ds=String(d.getDate()).padStart(2,'0')+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+d.getFullYear();
  fetch('https://api.aladhan.com/v1/timings/'+ds+'?latitude='+lat+'&longitude='+lon+'&method='+PRAYER_METHOD).then(r=>r.json()).then(j=>{const t=j.data.timings;state.prayerTimes={day:todayKey(),times:{fajr:t.Fajr,dhuhr:t.Dhuhr,asr:t.Asr,maghrib:t.Maghrib,isha:t.Isha}};state.geo={lat,lon};save();pFetching=false;renderDay();renderPrayerSetup();}).catch(e=>{pFetching=false;});}
function setupPrayerAuto(){if(!navigator.geolocation){toast('Position indisponible — saisis à la main');return;}toast('📍 Localisation…');navigator.geolocation.getCurrentPosition(p=>fetchPrayerTimes(p.coords.latitude,p.coords.longitude),e=>{toast('Position refusée — saisis à la main');$('#ptForm').classList.add('show');},{timeout:10000});}
function prayerStatus(pid,now){now=now||new Date();if(!state.prayerTimes||state.prayerTimes.day!==todayKey())return{state:'free'};const hm=state.prayerTimes.times[pid];if(!hm)return{state:'free'};const[H,M]=hm.split(':').map(Number);const start=new Date();start.setHours(H,M,0,0);let end=new Date(start.getTime()+PRAYER_WINDOW*60000);const idx=PRAYER_IDS.indexOf(pid);if(idx<PRAYER_IDS.length-1){const nh=state.prayerTimes.times[PRAYER_IDS[idx+1]];if(nh){const[nH,nM]=nh.split(':').map(Number);const ns=new Date();ns.setHours(nH,nM,0,0);if(ns<end)end=ns;}}if(state.done[pid])return{state:'done',at:hm};if(now<start)return{state:'soon',at:hm,remain:start-now};if(now<end)return{state:'open',at:hm,remain:end-now};return{state:'late',at:hm};}

/* ---------- feedback ---------- */
let audioCtx=null;
function beep(freq=660,dur=.12,type='sine',vol=.15){if(state.muted||reduce)return;try{audioCtx=audioCtx||new(window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.value=freq;o.connect(g);g.connect(audioCtx.destination);g.gain.setValueAtTime(vol,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+dur);o.start();o.stop(audioCtx.currentTime+dur);}catch(e){}}
function vibrate(p){if(navigator.vibrate&&!state.muted)try{navigator.vibrate(p);}catch(e){}}
function floatPts(x,y,txt,color){const el=document.createElement('div');el.className='float-pts';el.textContent=txt;el.style.color=color;el.style.left=x+'px';el.style.top=y+'px';document.body.appendChild(el);setTimeout(()=>el.remove(),1000);}
let toastT;function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2400);}
const cf=$('#confetti'),cfx=cf.getContext('2d');let cfp=[],cfRun=false;
function sizeCf(){cf.width=innerWidth*devicePixelRatio;cf.height=innerHeight*devicePixelRatio;cfx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);}
function burst(n){if(reduce)return;sizeCf();const cols=['#8B7BFF','#FFD36B','#FF6B7A','#39D39B','#fff'];for(let i=0;i<(n||90);i++)cfp.push({x:innerWidth/2,y:innerHeight*.34,vx:(Math.random()-.5)*10,vy:Math.random()*-10-4,g:.34,s:Math.random()*6+3,c:cols[i%cols.length],r:Math.random()*6,vr:(Math.random()-.5)*.4,a:1,life:0});if(!cfRun){cfRun=true;requestAnimationFrame(cfStep);}}
function cfStep(){cfx.clearRect(0,0,innerWidth,innerHeight);cfp=cfp.filter(p=>p.a>0&&p.y<innerHeight+60&&p.life<170);for(const p of cfp){p.life++;p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;if(p.life>34)p.a-=.028;cfx.save();cfx.globalAlpha=Math.max(0,p.a);cfx.translate(p.x,p.y);cfx.rotate(p.r);cfx.fillStyle=p.c;cfx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6);cfx.restore();}if(cfp.length)requestAnimationFrame(cfStep);else{cfRun=false;cfx.clearRect(0,0,innerWidth,innerHeight);}}

/* ---------- awarding + session ---------- */
let SESS=null;
function startSess(cat,kind){SESS={cat,kind,xp:0,dhikr:0,cycles:0,verses:0,pages:0,surahs:0,correct:0,total:0};}
function updateBaraka(){const b=$('#barakaChip');if(b)b.textContent='✦ '+nf.format(state.baraka);const o=$('#orChip');if(o)o.textContent='🪙 '+nf.format(state.gold);}
function award(catId,pts,el){if(pts<=0)return 0;const mult=boostActive()?2:1;const g=Math.round(pts*mult);const before=catLevel(catId);state.xp[catId]=(state.xp[catId]||0)+g;if(SESS)SESS.xp+=g;save();const cat=state.cats.find(c=>c.id===catId);if(el){const r=el.getBoundingClientRect();floatPts(r.left+r.width/2,r.top+r.height/2,'+'+g,cat?cat.color:'var(--accent)');}beep(700,.1);if(catLevel(catId)>before){beep(880,.16,'triangle',.14);toast('⬆️ '+(cat?cat.name:'')+' niveau '+catLevel(catId)+' — ton héros se renforce !');}return g;}
function toggleTask(id,el){ensureDay();const t=state.tasks.find(x=>x.id===id);if(!t||t.type!=='check')return;const on=!state.done[id];if(on){state.done[id]=true;if(state.streakDay!==state.day){const y=new Date();y.setDate(y.getDate()-1);state.streak=(state.streakDay===todayKey(y))?state.streak+1:1;state.streakDay=state.day;}award(t.cat,t.pts,el);}else{delete state.done[id];state.xp[t.cat]=Math.max(0,(state.xp[t.cat]||0)-t.pts);beep(380,.08,'sine',.08);save();}renderDay();}
function addEuros(amt){if(!amt||amt<=0)return;ensureDay();const cat=state.cats.find(c=>c.id==='richesse');const before=rankFor(state.euros,cat.ranks).cur;state.euros+=amt;state.daily.euros+=amt;save();const inp=$('#eurInput');if(inp){const r=inp.getBoundingClientRect();floatPts(r.left+40,r.top,'+'+nf.format(amt)+'€',cat.color);}beep(620,.12,'sine',.13);const after=rankFor(state.euros,cat.ranks).cur;if(after>before){burst();beep(920,.2,'triangle',.15);toast('🎉 Nouveau rang : '+cat.ranks[after][1]);}renderDay();}

/* ---------- quests ---------- */
function hashStr(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return h;}
function todayQuests(){let s=hashStr(state.day)||1;const pool=QUEST_POOL.slice(),out=[];for(let k=0;k<3&&pool.length;k++){s=(s*9301+49297)%233280;out.push(pool.splice(s%pool.length,1)[0]);}return out;}
function metricVal(m){switch(m){case'prayers':return PRAYER_IDS.filter(id=>state.done[id]).length;case'dhikr':return state.daily.dhikr;case'verses':return state.daily.verses;case'pages':return state.daily.pages;case'surahs':return state.daily.surahs;case'quiz':return state.daily.quiz;case'kills':return state.daily.kills||0;case'euros':return state.daily.euros;case'tasks':return Object.keys(state.done).length;}return 0;}
function claimQuest(q){ensureDay();if(state.daily.claimed[q.id]||metricVal(q.metric)<q.goal)return;state.daily.claimed[q.id]=true;state.baraka+=q.baraka;if(q.xp>0&&q.cat)award(q.cat,q.xp,$('#barakaChip'));save();updateBaraka();burst(40);beep(1000,.2,'triangle',.15);toast('✦ +'+q.baraka+' Baraka'+(q.xp?(' · +'+q.xp+' XP'):''));renderDay();}

/* ---------- combat / arena ---------- */
let CB=null, autoTimer=null;
function ensureBattle(){const hs=heroStats();const mob=mobAt(state.floor);if(!CB||CB.floor!==state.floor){CB={floor:state.floor,hp:hs.pvmax,mobHP:mob.hp,busy:false};}CB.hp=Math.min(CB.hp,hs.pvmax);}
function renderArena(){ensureDay();ensureBattle();const hs=heroStats();const mob=mobAt(state.floor);const arm=equippedArmor(),wep=equippedWeapon(),amu=equippedAmulet();const hpPct=Math.max(0,CB.hp/hs.pvmax*100),mPct=Math.max(0,CB.mobHP/mob.hp*100);
  $('#view-arene').innerHTML=`
   <div class="arena-head"><span class="floor-badge">⚔️ Étage <b>${state.floor}</b></span><span class="cur or">🪙 ${nf.format(state.gold)}</span><span class="cur bk">✦ ${nf.format(state.baraka)}</span></div>

   <div class="hstats"><span class="hstat" style="color:#E0475C">🗡️ ATK <b>${hs.atk}</b></span><span class="hstat" style="color:#1FA97A">❤️ PV <b>${hs.pvmax}</b></span><span class="hstat" style="color:#2D8CFF">🛡️ DEF <b>${hs.def}</b></span><span class="hstat" style="color:#C99A2E">✦ CRIT <b>${hs.crit}%</b></span></div>

  updateBaraka();
}
function updateBattleUI(){const hs=heroStats(),mob=mobAt(state.floor);const hi=document.querySelector('.hp.hero>i'),mi=document.querySelector('.hp.mob>i');if(hi)hi.style.width=Math.max(0,CB.hp/hs.pvmax*100)+'%';if(mi)mi.style.width=Math.max(0,CB.mobHP/mob.hp*100)+'%';const ht=document.querySelectorAll('.hptext');if(ht[0])ht[0].textContent=Math.max(0,Math.ceil(CB.hp))+' / '+hs.pvmax+' PV';if(ht[1])ht[1].textContent=Math.max(0,Math.ceil(CB.mobHP))+' / '+mob.hp+' PV';}
function animateAttack(who){const el=$(who==='hero'?'#heroBody':'#mobBody');if(el){const cls=who==='hero'?'lunge-r':'lunge-l';el.classList.add(cls);setTimeout(()=>el.classList.remove(cls),160);}const foe=$(who==='hero'?'#mobBody':'#heroBody');if(foe){foe.classList.add('hit');setTimeout(()=>foe.classList.remove('hit'),300);}}
function floatDmg(who,text,crit,positive){const f=$(who==='hero'?'.fighter.hero':'.fighter.mob');if(!f)return;const d=document.createElement('div');d.className='dmg'+(crit?' crit':'');d.textContent=(typeof text==='number'?('-'+text):text);d.style.color=positive?'#39D39B':(who==='hero'?'#FF6B7A':(crit?'#FFD36B':'#fff'));f.appendChild(d);setTimeout(()=>d.remove(),820);}
function attack(){ensureBattle();if(CB.busy)return;const hs=heroStats(),mob=mobAt(state.floor);const crit=Math.random()*100<hs.crit;const dmg=Math.max(1,Math.round(hs.atk*(crit?2:1)*(0.85+Math.random()*0.3)));CB.mobHP-=dmg;animateAttack('hero');floatDmg('mob',dmg,crit,false);beep(crit?720:520,.06,'square',.07);vibrate(crit?24:9);if(CB.mobHP<=0){CB.mobHP=0;updateBattleUI();victory(mob);return;}const mdmg=Math.max(1,Math.round((mob.atk-hs.def)*(0.85+Math.random()*0.3)));CB.hp-=mdmg;setTimeout(()=>{animateAttack('mob');floatDmg('hero',mdmg,false,false);},150);if(CB.hp<=0){CB.hp=0;updateBattleUI();setTimeout(defeat,320);return;}updateBattleUI();}
function victory(mob){CB.busy=true;state.gold+=mob.gold;ensureDay();state.daily.kills=(state.daily.kills||0)+1;const mb=$('#mobBody');if(mb)mb.classList.add('dead');floatDmg('mob','+'+mob.gold+' 🪙',true,true);beep(880,.18,'triangle',.14);burst(mob.boss?90:28);updateBaraka();save();setTimeout(()=>{state.floor++;CB=null;save();renderArena();toast(mob.boss?('👑 Boss vaincu ! +'+mob.gold+' or'):('Vaincu ! +'+mob.gold+' or'));},520);}
function defeat(){CB.busy=true;stopAuto();const hb=$('#heroBody');if(hb)hb.classList.add('flash');beep(200,.3,'sawtooth',.1);const hs=heroStats(),mob=mobAt(state.floor);setTimeout(()=>{CB={floor:state.floor,hp:hs.pvmax,mobHP:mob.hp,busy:false};renderArena();toast('💀 Vaincu ! Renforce-toi : prières, quiz, ou meilleur équipement.');},650);}
function toggleAuto(){if(autoTimer){stopAuto();}else{autoTimer=setInterval(()=>{if($('#view-arene').classList.contains('hidden')){return;}if(CB&&CB.busy)return;attack();},620);}renderArena();}
function stopAuto(){if(autoTimer){clearInterval(autoTimer);autoTimer=null;}}
function buyGear(id){const it=itemById(id);if(!it||state.owned.includes(id)||state.gold<it.cost||heroStats().level<it.req)return;state.gold-=it.cost;state.owned.push(id);state.gear[it.slot]=id;CB=null;save();updateBaraka();renderShop();renderArena();burst(40);beep(900,.18,'triangle',.15);vibrate(30);toast('🛡️ '+it.name+' acheté et équipé !');}
function equipGear(id){const it=itemById(id);if(!it||!state.owned.includes(id))return;state.gear[it.slot]=id;CB=null;save();renderShop();renderArena();beep(760,.12);toast('Équipé : '+it.name);}

function renderQuests(){const qs=todayQuests();let h=`<div class="quests"><h3>🎯 Quêtes du jour</h3><div class="qsub">Réussis-les pour gagner de la Baraka ✦ et de l’XP bonus.</div>`;for(const q of qs){const v=Math.min(metricVal(q.metric),q.goal),pct=v/q.goal*100,claimed=state.daily.claimed[q.id],ready=v>=q.goal;h+=`<div class="quest"><div class="qi">${q.emoji}</div><div class="qmain"><div class="qn">${q.label}</div><div class="qbar"><i style="width:${pct}%"></i></div><div class="qr">${v}/${q.goal} · récompense <b>✦${q.baraka}</b>${q.xp?(' + '+q.xp+' XP'):''}</div></div>${claimed?'<span class="qdone">✓ fait</span>':(ready?`<button class="qclaim" data-quest="${q.id}">Réclamer</button>`:'')}</div>`;}h+='</div>';return h;}

></span><span class="task-pts">+${per}</span><button class="del" data-del="${t.id}" aria-label="Supprimer">×</button></div>`;}else if(t.type==='learn'){h+=`<div class="task" data-learn="${t.id}" style="--cc:${c.color}"><span class="play">🎓</span><span class="task-label">${escapeHtml(t.name)}<div class="tsub">Apprends puis teste-toi (+${LESSON_PTS[t.set]}/bonne réponse)</div></span><span class="task-pts">quiz</span><button class="del" data-del="${t.id}" aria-label="Supprimer">×</button></div>`;}else{const isPrayer=PRAYER_IDS.includes(t.id);const done=!!state.done[t.id];let extra='',cls='',lock='';if(isPrayer){const s=prayerStatus(t.id);if(s.state==='soon'){cls='locked';lock='1';extra=`<div class="pt soon" id="pt-${t.id}">🕐 à ${s.at}</div>`;}else if(s.state==='open'){cls='open';extra=`<div class="pt open" id="pt-${t.id}">⏳ ${fmtDur(s.remain)} pour valider</div>`;}else if(s.state==='late'){cls='locked';lock='1';extra=`<div class="pt late" id="pt-${t.id}">⌛ trop tard (${s.at})</div>`;}}h+=`<div class="task ${done?'done':''} ${cls}" data-id="${t.id}" ${lock?'data-locked="1"':''} style="--cc:${c.color}"><span class="check"><svg viewBox="0 0 24 24"><path d="M4 12l5 5L20 6"/></svg></span><span class="task-label">${escapeHtml(t.name)}${extra}</span><span class="task-pts">+${t.pts}</span><button class="del" data-del="${t.id}" aria-label="Supprimer">×</button></div>`;}}h+='</div>';}h+='</div>';}$('#taskGroups').innerHTML=h;$('#ntCat').innerHTML=state.cats.filter(c=>c.type==='xp').map(c=>`<option value="${c.id}">${c.emoji} ${c.name}</option>`).join('');}

/* ---------- render: evo ---------- */
function renderPrayerSetup(){const box=$('#prayerSetup');const set=state.prayerTimes&&state.prayerTimes.day===todayKey();if(set){const T=state.prayerTimes.times;box.innerHTML=`<div class="pdesc">Après l’heure de chaque prière, tu as <b>1h pour la valider</b>, sinon c’est « trop tard ». Actualisé chaque jour selon ta position.</div><div class="ptimes">${PRAYER_IDS.map(p=>`<span class="ptime"><b>${p[0].toUpperCase()+p.slice(1)}</b> ${T[p]}</span>`).join('')}</div><div class="prow"><button class="btn ghost" id="prayerAuto">📍 Actualiser</button><button class="btn ghost" id="prayerClear">Désactiver</button></div>`;}else{box.innerHTML=`<div class="pdesc">Active un <b>chrono de prière</b> : à partir de l’heure de chaque prière tu as 1h pour la valider. Sans ça, tu peux valider à tout moment.</div><div class="prow"><button class="btn" id="prayerAuto">📍 Utiliser ma position</button><button class="btn ghost" id="prayerManual">✎ Saisir à la main</button></div><div class="pt-form" id="ptForm">${PRAYER_IDS.map(p=>`<label>${p[0].toUpperCase()+p.slice(1)}<input type="time" id="pf-${p}"></label>`).join('')}<button class="btn" id="ptSave">Enregistrer mes horaires</button></div>`;}}
function renderShop(){const hl=heroStats().level;let h='';for(const [slot,label,ic] of SLOTS){h+=`<div class="sec-label">${ic} ${label}</div><div class="gear-list">`;for(const it of ITEMS.filter(x=>x.slot===slot)){const owned=state.owned.includes(it.id);const eq=state.gear[slot]===it.id;const stats=[it.atk?`🗡️+${it.atk}`:'',it.pv?`❤️+${it.pv}`:'',it.def?`🛡️+${it.def}`:'',it.crit?`✦+${it.crit}%`:''].filter(Boolean).join(' · ');let btn;if(eq)btn='<button class="gbtn on" disabled>Équipé ✓</button>';else if(owned)btn=`<button class="gbtn" data-equip="${it.id}">Équiper</button>`;else if(hl<it.req)btn=`<button class="gbtn lock" disabled>🔒 Nv ${it.req}</button>`;else if(state.gold>=it.cost)btn=`<button class="gbtn buy" data-buygear="${it.id}">🪙 ${nf.format(it.cost)}</button>`;else btn=`<button class="gbtn lock" disabled>🪙 ${nf.format(it.cost)}</button>`;const prev=it.c?`background:linear-gradient(160deg,${it.c[0]},${it.c[1]})`:'background:var(--surface-2)';h+=`<div class="gear ${eq?'eq':''}"><div class="gic" style="${prev}">${it.ic}</div><div class="gmain"><div class="gn">${it.name}</div><div class="gs">${stats||'—'}</div></div>${btn}</div>`;}h+='</div>';}
  const ba=boostActive();h+=`<div class="sec-label">✦ Bonus (Baraka)</div><div class="boost"><div class="bi">⚡</div><div class="bm"><div class="bn">Journée bénie ×2</div><div class="bd">${ba?'Actif — points doublés aujourd’hui':'Double les points gagnés aujourd’hui.'}</div></div>${ba?'<span class="qdone">✓ actif</span>':`<button class="btn ${state.baraka>=BOOST_COST?'gold':'ghost'}" id="buyBoost" ${state.baraka<BOOST_COST?'disabled':''}>✦${BOOST_COST}</button>`}</div>`;
  $('#shopMain').innerHTML=h;renderPrayerSetup();updateBaraka();}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ---------- modal ---------- */
const modal=$('#modal');let CT=null,RD=null;
function showModal(){modal.classList.remove('hidden');}
function hideModal(){modal.classList.add('hidden');modal.innerHTML='';SESS=null;CT=null;RD=null;renderDay();renderArena();}
function closeModal(){if(SESS&&SESS.xp>0)buildRecap();else hideModal();}
function buildRecap(){const cat=state.cats.find(c=>c.id===SESS.cat)||{color:'var(--accent)',name:''};let detail='',emoji='✨';if(SESS.kind==='dhikr'){emoji='📿';detail=SESS.dhikr+' dhikr · '+SESS.cycles+' cycle'+(SESS.cycles>1?'s':'');}else if(SESS.kind==='coran'){emoji='🕋';detail=SESS.verses+' verset'+(SESS.verses>1?'s':'')+' lu'+(SESS.verses>1?'s':'');}else if(SESS.kind==='esprit'){emoji='📖';detail=SESS.pages+' page'+(SESS.pages>1?'s':'')+' lue'+(SESS.pages>1?'s':'');}else if(SESS.kind==='quiz'){emoji='🎓';detail=SESS.correct+' / '+SESS.total+' bonnes réponses';}modal.innerHTML=`<div class="modal-body recap" style="--cc:${cat.color}"><div class="remoji">${emoji}</div><div class="rbig">Session terminée</div><div class="rxp">+${SESS.xp}</div><div class="rxpl">points de ${cat.name}</div><div class="rline">${detail}</div><button class="btn" data-recapclose style="background:${cat.color};padding:14px 28px;margin-top:6px">Continuer</button></div>`;burst(80);beep(990,.25,'triangle',.16);vibrate([20,40,20]);}

/* counter */
function openCounter(taskId){const t=state.tasks.find(x=>x.id===taskId);startSess(t.cat,'dhikr');CT={idx:0,count:0,taskId,cat:t.cat};buildCounter();showModal();}
function buildCounter(){const cat=state.cats.find(c=>c.id===CT.cat),d=DHIKR[CT.idx],tar=d.target,per=dhikrPts(tar),pct=CT.count/tar*100;modal.innerHTML=`<div class="modal-top"><button class="icon-btn" data-close>←</button><div class="mt-title">📿 Dhikr</div></div><div class="modal-body count-wrap" style="--cc:${cat.color}"><div><div class="dhikr-ar">${d.ar}</div><div class="dhikr-tr">${d.tr}</div><div class="dhikr-fr">« ${d.fr} »</div></div><div class="dhikr-pick">${DHIKR.map((x,i)=>`<button class="dp ${i===CT.idx?'on':''}" data-dh="${i}">${x.tr} · ${x.target}</button>`).join('')}</div><div class="ring" id="ringEl" style="--p:${pct}"><div class="inner"><div class="cnum" id="cnum">${CT.count}</div><div class="ctar">/ ${tar}</div><div class="ctap">tape pour compter</div></div></div><div class="per-line">Cycle de ${tar} = +${per} Âme</div><div class="cyc-line">Cycles : <b id="cyc">${SESS.cycles}</b></div><div class="count-actions"><button class="btn ghost" data-reset>↺ 0</button><button class="btn" data-close style="background:${cat.color}">Terminer</button></div></div>`;}
function ringTap(){const d=DHIKR[CT.idx],tar=d.target;CT.count++;SESS.dhikr++;if(CT.count>=tar){CT.count=0;SESS.cycles++;ensureDay();state.daily.dhikr+=tar;award(CT.cat,dhikrPts(tar),$('#ringEl'));save();vibrate([30,40,30]);beep(920,.18,'triangle',.15);burst(40);}else{beep(560+CT.count*4,.05,'sine',.09);vibrate(12);}const ring=$('#ringEl');if(ring){ring.style.setProperty('--p',(CT.count/tar*100));$('#cnum').textContent=CT.count;$('#cyc').textContent=SESS.cycles;}}
function pickDhikr(i){CT.idx=i;CT.count=0;buildCounter();}

/* reader */
function openReader(taskId){const t=state.tasks.find(x=>x.id===taskId);startSess(t.cat,t.lib);RD={kind:t.lib,cat:t.cat,taskId};if(t.lib==='coran'){RD.si=Math.floor(Math.random()*CORAN.length);RD.vi=0;buildVerse();}else{RD.view='lib';buildReaderLib();}showModal();}
function buildVerse(){const cat=state.cats.find(c=>c.id===RD.cat),s=CORAN[RD.si],v=s.v[RD.vi];modal.innerHTML=`<div class="modal-top"><button class="icon-btn" data-close>←</button><div class="mt-title">${s.t}</div></div><div class="modal-body" style="--cc:${cat.color}"><div class="reader-page arabic"><div class="vhead">${s.t.split(' — ')[0]} · verset ${RD.vi+1}/${s.v.length}</div><div class="ar">${v[0]}</div><div class="tr">${v[1]}</div><div class="fr">${v[2]}</div></div><button class="btn bignext" data-nextverse style="background:${cat.color}">Suivant ›</button><p class="muted-note">Chaque verset lu = +${PPP.coranVerse} Foi. Reviens en arrière (←) pour voir ton récap.</p></div>`;}
function nextVerse(){ensureDay();const s=CORAN[RD.si];award(RD.cat,PPP.coranVerse,null);SESS.verses++;state.daily.verses++;if(RD.vi>=s.v.length-1){state.daily.surahs++;SESS.surahs++;RD.si=Math.floor(Math.random()*CORAN.length);RD.vi=0;}else RD.vi++;save();beep(600,.05,'sine',.08);vibrate(10);buildVerse();}
function buildReaderLib(){const cat=state.cats.find(c=>c.id===RD.cat);modal.innerHTML=`<div class="modal-top"><button class="icon-btn" data-close>←</button><div class="mt-title">📖 Lecture</div></div><div class="modal-body"><div class="lib">${ESPRIT.map((it,i)=>{const read=state.daily.readToday['e'+i];return`<div class="libitem ${read?'read':''}" data-open="${i}" style="--cc:${cat.color}"><div class="lt"><div class="ltn">${it.title}</div><div class="lts">${read?'déjà lu aujourd’hui':it.pages.length+' pages'}</div></div><div class="lgo">›</div></div>`;}).join('')}</div><p class="muted-note">Tes pages lues font monter ton Esprit. Reviens (←) pour ton récap.</p></div>`;}
function openReaderItem(i){RD.bi=i;RD.item=ESPRIT[i];RD.page=0;RD.max=0;buildReaderPage();}
function buildReaderPage(){const cat=state.cats.find(c=>c.id===RD.cat),it=RD.item,tot=it.pages.length,last=RD.page>=tot-1;modal.innerHTML=`<div class="modal-top"><button class="icon-btn" data-backlib>←</button><div class="mt-title">${it.title}</div></div><div class="modal-body" style="--cc:${cat.color}"><div class="reader-page"><div class="fr" style="text-align:left">${it.pages[RD.page]}</div></div><div class="reader-nav"><button class="btn ghost" data-prev ${RD.page===0?'disabled':''}>‹</button><span class="pg">page ${RD.page+1} / ${tot}</span>${last?`<button class="btn" data-finishbook style="background:${cat.color}">Terminer (+${(RD.max+1)*PPP.esprit})</button>`:'<button class="btn" data-next>Suivant ›</button>'}</div></div>`;}
function readerNext(){if(RD.page<RD.item.pages.length-1){RD.page++;RD.max=Math.max(RD.max,RD.page);beep(600,.05,'sine',.08);buildReaderPage();}}
function readerPrev(){if(RD.page>0){RD.page--;buildReaderPage();}}
function finishBook(){ensureDay();const pages=RD.max+1;const g=award(RD.cat,pages*PPP.esprit,$('#barakaChip'));state.daily.pages+=pages;state.daily.readToday['e'+RD.bi]=true;save();toast('📖 '+pages+' page'+(pages>1?'s':'')+' · +'+g+' Esprit');beep(900,.16,'triangle',.14);buildReaderLib();}

/* learn + quiz */
let LR=null;
function openLearn(taskId){const t=state.tasks.find(x=>x.id===taskId);startSess(t.cat,'quiz');LR={set:t.set,cat:t.cat,taskId};buildLearnLib();showModal();}
function buildLearnLib(){const cat=state.cats.find(c=>c.id===LR.cat),list=LESSONS[LR.set],isEn=LR.set==='anglais';modal.innerHTML=`<div class="modal-top"><button class="icon-btn" data-close>←</button><div class="mt-title">${isEn?'🗣️ Anglais':'🎓 Savoir'}</div></div><div class="modal-body"><div class="lib">${list.map((l,i)=>{const best=state.daily.readToday[LR.set+i];return`<div class="libitem" data-openlesson="${i}" style="--cc:${cat.color}"><div class="lt"><div class="ltn">${l.emoji} ${l.title}</div><div class="lts">${best?('score du jour : '+best):(l.quiz.length+' questions · apprends puis teste-toi')}</div></div><div class="lgo">›</div></div>`;}).join('')}</div><p class="muted-note">Apprends la leçon, puis gagne des points selon tes bonnes réponses.</p></div>`;}
function openLesson(i){LR.li=i;LR.lesson=LESSONS[LR.set][i];LR.page=0;buildTeach();}
function buildTeach(){const cat=state.cats.find(c=>c.id===LR.cat),l=LR.lesson,tot=l.teach.length,last=LR.page>=tot-1;modal.innerHTML=`<div class="modal-top"><button class="icon-btn" data-backlearnlib>←</button><div class="mt-title">${l.emoji} ${l.title}</div></div><div class="modal-body" style="--cc:${cat.color}"><div class="reader-page"><div class="fr" style="text-align:left">${l.teach[LR.page]}</div></div><div class="reader-nav"><button class="btn ghost" data-teachprev ${LR.page===0?'disabled':''}>‹</button><span class="pg">${LR.page+1} / ${tot}</span>${last?`<button class="btn" data-startquiz style="background:${cat.color}">Commencer le quiz ▶</button>`:'<button class="btn" data-teachnext>Suivant ›</button>'}</div></div>`;}
function teachNext(){if(LR.page<LR.lesson.teach.length-1){LR.page++;beep(600,.05,'sine',.08);buildTeach();}}
function teachPrev(){if(LR.page>0){LR.page--;buildTeach();}}
function startQuiz(){LR.qi=0;LR.correct=0;LR.answered=false;LR.chosen=-1;buildQuiz();}
function buildQuiz(){const cat=state.cats.find(c=>c.id===LR.cat),l=LR.lesson,q=l.quiz[LR.qi];const opts=q.opts.map((o,i)=>{let cls='';if(LR.answered){if(i===q.a)cls='correct';else if(i===LR.chosen)cls='wrong';}return`<button class="qopt ${cls}" data-opt="${i}" ${LR.answered?'disabled':''}>${escapeHtml(o)}</button>`;}).join('');const feed=LR.answered?(LR.chosen===q.a?`<div class="qfeed" style="color:var(--good)">✓ Bonne réponse !</div>`:`<div class="qfeed" style="color:var(--danger)">✗ Raté — la bonne réponse est en vert</div>`):'';modal.innerHTML=`<div class="modal-top"><button class="icon-btn" data-close>←</button><div class="mt-title">${l.emoji} Quiz</div></div><div class="modal-body" style="--cc:${cat.color}"><div class="qprog">Question ${LR.qi+1} / ${l.quiz.length} · ${LR.correct} ✓</div><div class="quiz"><div class="qq">${escapeHtml(q.q)}</div><div class="qopts">${opts}</div>${feed}${LR.answered?`<button class="btn" data-nextq style="background:${cat.color};margin-top:4px">${LR.qi>=l.quiz.length-1?'Voir mon score 🎉':'Question suivante ›'}</button>`:''}</div></div>`;}
function answerQuiz(idx){if(LR.answered)return;LR.answered=true;LR.chosen=idx;const q=LR.lesson.quiz[LR.qi];if(idx===q.a){LR.correct++;beep(880,.14,'triangle',.14);vibrate(20);}else{beep(300,.14,'sine',.12);vibrate([20,40]);}buildQuiz();}
function nextQuiz(){if(LR.qi>=LR.lesson.quiz.length-1){finishQuiz();return;}LR.qi++;LR.answered=false;LR.chosen=-1;buildQuiz();}
function finishQuiz(){ensureDay();const per=LESSON_PTS[LR.set];award(LR.cat,LR.correct*per,null);SESS.correct=LR.correct;SESS.total=LR.lesson.quiz.length;state.daily.quiz+=LR.correct;state.daily.readToday[LR.set+LR.li]=LR.correct+'/'+LR.lesson.quiz.length;save();buildRecap();}

/* ---------- events ---------- */
modal.addEventListener('click',e=>{const t=e.target;if(t.closest('[data-recapclose]')){hideModal();return;}if(t.closest('[data-close]')){closeModal();return;}if(t.closest('[data-reset]')){CT.count=0;buildCounter();return;}const dh=t.closest('[data-dh]');if(dh){pickDhikr(+dh.getAttribute('data-dh'));return;}if(t.closest('#ringEl')){ringTap();return;}if(t.closest('[data-nextverse]')){nextVerse();return;}if(t.closest('[data-backlib]')){buildReaderLib();return;}const op=t.closest('[data-open]');if(op){openReaderItem(+op.getAttribute('data-open'));return;}if(t.closest('[data-next]')){readerNext();return;}if(t.closest('[data-prev]')){readerPrev();return;}if(t.closest('[data-finishbook]')){finishBook();return;}
  if(t.closest('[data-backlearnlib]')){buildLearnLib();return;}const ol=t.closest('[data-openlesson]');if(ol){openLesson(+ol.getAttribute('data-openlesson'));return;}if(t.closest('[data-teachnext]')){teachNext();return;}if(t.closest('[data-teachprev]')){teachPrev();return;}if(t.closest('[data-startquiz]')){startQuiz();return;}const qo=t.closest('[data-opt]');if(qo){answerQuiz(+qo.getAttribute('data-opt'));return;}if(t.closest('[data-nextq]')){nextQuiz();return;}});
$('#taskGroups').addEventListener('click',e=>{const del=e.target.closest('[data-del]');if(del){const id=del.getAttribute('data-del');state.tasks=state.tasks.filter(t=>t.id!==id);delete state.done[id];save();renderDay();renderArena();return;}if($('#view-day').classList.contains('editing'))return;const cnt=e.target.closest('[data-counter]');if(cnt){openCounter(cnt.getAttribute('data-counter'));return;}const rd=e.target.closest('[data-reader]');if(rd){openReader(rd.getAttribute('data-reader'));return;}const ln=e.target.closest('[data-learn]');if(ln){openLearn(ln.getAttribute('data-learn'));return;}const task=e.target.closest('[data-id]');if(task){const id=task.getAttribute('data-id');if(PRAYER_IDS.includes(id)&&!state.done[id]){const s=prayerStatus(id);if(s.state==='soon'){toast('🕐 Pas encore l’heure — à '+s.at);beep(300,.1);return;}if(s.state==='late'){toast('⌛ Trop tard pour valider cette prière');beep(300,.1);return;}}toggleTask(id,task);return;}if(e.target.closest('#eurAdd')){const v=parseFloat($('#eurInput').value);if(v>0){addEuros(Math.round(v));$('#eurInput').value='';}return;}const chip=e.target.closest('[data-eur]');if(chip)addEuros(parseInt(chip.getAttribute('data-eur')));});
$('#questBox').addEventListener('click',e=>{const q=e.target.closest('[data-quest]');if(q){const qq=todayQuests().find(x=>x.id===q.getAttribute('data-quest'));if(qq)claimQuest(qq);}});
$('#editToggle').addEventListener('click',()=>{const v=$('#view-day');v.classList.toggle('editing');const on=v.classList.contains('editing');$('#addForm').classList.toggle('hidden',!on);$('#editToggle').textContent=on?'✓ Terminé':'✎ Modifier mes tâches';});
$('#ntAdd').addEventListener('click',()=>{const name=$('#ntName').value.trim();const pts=parseInt($('#ntPts').value)||10;const cat=$('#ntCat').value;if(!name)return;state.tasks.push({id:'t'+(state.seq++),cat,name,pts:Math.max(1,Math.min(999,pts)),type:'check'});save();$('#ntName').value='';renderDay();beep(700,.1);});
$('#addCatBtn').addEventListener('click',()=>$('#addCatForm').classList.toggle('hidden'));
$('#ncAdd').addEventListener('click',()=>{const name=$('#ncName').value.trim();if(!name)return;const emoji=$('#ncEmoji').value.trim()||'⭐';const color=$('#ncColor').value;const id='c'+(state.seq++);state.cats.push({id,name,emoji,color,type:'xp'});state.xp[id]=0;save();$('#ncName').value='';$('#ncEmoji').value='';$('#addCatForm').classList.add('hidden');renderAll();toast(emoji+' Catégorie « '+name+' » créée');});
$('#view-arene').addEventListener('click',e=>{if(e.target.closest('#attackBtn')){attack();return;}if(e.target.closest('#autoBtn')){toggleAuto();return;}});
$('#shopMain').addEventListener('click',e=>{const bg=e.target.closest('[data-buygear]');if(bg){buyGear(bg.getAttribute('data-buygear'));return;}const eq=e.target.closest('[data-equip]');if(eq){equipGear(eq.getAttribute('data-equip'));return;}if(e.target.closest('#buyBoost')){buyBoost();return;}});
$('#prayerSetup').addEventListener('click',e=>{if(e.target.closest('#prayerAuto')){setupPrayerAuto();return;}if(e.target.closest('#prayerManual')){$('#ptForm').classList.toggle('show');return;}if(e.target.closest('#prayerClear')){state.prayerTimes=null;state.geo=null;save();renderPrayerSetup();renderDay();toast('Chrono de prière désactivé');return;}if(e.target.closest('#ptSave')){const T={};let ok=true;for(const p of PRAYER_IDS){const val=$('#pf-'+p).value;if(!val){ok=false;break;}T[p]=val;}if(!ok){toast('Remplis les 5 horaires');return;}state.prayerTimes={day:todayKey(),times:T};save();renderPrayerSetup();renderDay();toast('⏱ Horaires enregistrés');}});
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');const tab=t.getAttribute('data-tab');$('#view-arene').classList.toggle('hidden',tab!=='arene');$('#view-day').classList.toggle('hidden',tab!=='day');$('#view-shop').classList.toggle('hidden',tab!=='shop');if(tab!=='arene')stopAuto();if(tab==='arene')renderArena();if(tab==='day')renderDay();if(tab==='shop')renderShop();scrollTo({top:0,behavior:'smooth'});}));
function setTheme(t){state.theme=t;document.documentElement.setAttribute('data-theme',t);$('#themeBtn').textContent=t==='dark'?'☀️':'🌙';const m=document.querySelector('meta[name=theme-color]');if(m)m.content=(t==='dark'?'#0E0D18':'#F5F4FA');save();}
function toggleTheme(){const cur=document.documentElement.getAttribute('data-theme');const isDark=cur?cur==='dark':matchMedia('(prefers-color-scheme: dark)').matches;setTheme(isDark?'light':'dark');}
$('#themeBtn').addEventListener('click',toggleTheme);$('#themeBtn2').addEventListener('click',toggleTheme);
function toggleSound(){state.muted=!state.muted;save();updateSoundBtn();if(!state.muted)beep(700,.1);}
function updateSoundBtn(){$('#soundBtn').textContent=state.muted?'🔇':'🔊';}
$('#soundBtn').addEventListener('click',toggleSound);$('#soundBtn2').addEventListener('click',toggleSound);
$('#exportBtn').addEventListener('click',async()=>{try{await navigator.clipboard.writeText(JSON.stringify(state));toast('📋 Sauvegarde copiée');}catch(e){toast('Copie impossible — fais une capture');}});
$('#resetBtn').addEventListener('click',()=>{if(confirm('Tout remettre à zéro ? Progression, équipement, étages et Baraka seront perdus.')){const th=state.theme,mu=state.muted;stopAuto();state=defaultState();state.theme=th;state.muted=mu;CB=null;save();updateSoundBtn();if(th)setTheme(th);renderAll();toast('Nouveau départ ✦');}});

let lastP={};
function prayerTick(){if($('#view-day').classList.contains('hidden'))return;if(!state.prayerTimes||state.prayerTimes.day!==todayKey())return;const now=new Date();let changed=false;for(const p of PRAYER_IDS){const s=prayerStatus(p,now);if(lastP[p]!==s.state)changed=true;lastP[p]=s.state;if(s.state==='open'){const el=document.getElementById('pt-'+p);if(el)el.textContent='⏳ '+fmtDur(s.remain)+' pour valider';}}if(changed)renderDay();}
setInterval(prayerTick,1000);

function renderAll(){renderArena();renderDay();renderShop();}
if(state.theme)setTheme(state.theme);
updateSoundBtn();updateBaraka();renderArena();renderDay();
addEventListener('visibilitychange',()=>{if(!document.hidden){ensureDay();renderArena();renderDay();}});
</script>
</body>
</html>
